<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square in site accent -->
  <rect width="32" height="32" rx="7" ry="7" fill="#8b1a2e"/>

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="30" height="15" rx="6" ry="6" fill="rgba(255,255,255,0.06)"/>

  <!-- Letter C — clean, slightly condensed, white -->
  <text
    x="16" y="23"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.5"
  >C</text>

  <!-- Small dot accent bottom-right — echoes the brand feel -->
  <circle cx="23.5" cy="25.5" r="2" fill="rgba(255,255,255,0.35)"/>
</svg>
