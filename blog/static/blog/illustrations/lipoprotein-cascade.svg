<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440">
<defs>
  <radialGradient id="bg" cx="50%" cy="40%" r="70%">
    <stop offset="0%" stop-color="#0c1220"/>
    <stop offset="100%" stop-color="#060c16"/>
  </radialGradient>
  <!-- particle fills -->
  <radialGradient id="vldl-fill" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#f0c040"/>
    <stop offset="60%" stop-color="#d09020"/>
    <stop offset="100%" stop-color="#a06010"/>
  </radialGradient>
  <radialGradient id="idl-fill" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#e8a830"/>
    <stop offset="55%" stop-color="#c07818"/>
    <stop offset="100%" stop-color="#984810"/>
  </radialGradient>
  <radialGradient id="ldl-fill" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#e09040"/>
    <stop offset="55%" stop-color="#b85c18"/>
    <stop offset="100%" stop-color="#8a3808"/>
  </radialGradient>
  <radialGradient id="hdl-fill" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#40d8c0"/>
    <stop offset="60%" stop-color="#1890a0"/>
    <stop offset="100%" stop-color="#0c5060"/>
  </radialGradient>
  <radialGradient id="liver-fill" cx="45%" cy="38%" r="60%">
    <stop offset="0%" stop-color="#6030c0"/>
    <stop offset="70%" stop-color="#3a1880"/>
    <stop offset="100%" stop-color="#1c0840"/>
  </radialGradient>
  <radialGradient id="cell-fill" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#1a3060"/>
    <stop offset="100%" stop-color="#0c1830"/>
  </radialGradient>
  <filter id="glow-s"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow-m"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
  <filter id="blur5"><feGaussianBlur stdDeviation="5"/></filter>
</defs>

<style>
@keyframes liver-pulse {
  0%,100%{ opacity:0.85; }
  50%    { opacity:1; }
}
@keyframes tg-float-1 {
  0%  { transform:translate(0,0);   opacity:0.9; }
  60% { transform:translate(-6px,-18px); opacity:0.6; }
  100%{ transform:translate(-10px,-32px); opacity:0; }
}
@keyframes tg-float-2 {
  0%  { transform:translate(0,0);   opacity:0.8; }
  60% { transform:translate(8px,-16px); opacity:0.5; }
  100%{ transform:translate(14px,-30px); opacity:0; }
}
@keyframes tg-float-3 {
  0%  { transform:translate(0,0);   opacity:0.85; }
  60% { transform:translate(2px,-20px); opacity:0.5; }
  100%{ transform:translate(4px,-35px); opacity:0; }
}
@keyframes flow-arrow {
  0%  { stroke-dashoffset:40; opacity:0.3; }
  100%{ stroke-dashoffset:0;  opacity:0.8; }
}
@keyframes ldl-dock {
  0%,100%{ transform:translateX(0); }
  50%    { transform:translateX(3px); }
}
@keyframes receptor-open {
  0%,100%{ d:path("M 618 192 Q 628 198 628 210 Q 628 222 618 228"); }
  50%    { d:path("M 618 192 Q 638 198 638 210 Q 638 222 618 228"); }
}
@keyframes apob-spin {
  from{ stroke-dashoffset:0; }
  to  { stroke-dashoffset:-60; }
}
@keyframes slide-in-t {
  from{ opacity:0; transform:translateY(-10px); }
  to  { opacity:1; transform:translateY(0); }
}
@keyframes slide-in-l {
  from{ opacity:0; transform:translateX(-12px); }
  to  { opacity:1; transform:translateX(0); }
}
@keyframes slide-in-r {
  from{ opacity:0; transform:translateX(12px); }
  to  { opacity:1; transform:translateX(0); }
}
@keyframes endocytosis {
  0%,100%{ transform:translateY(0) scale(1); opacity:1; }
  60%    { transform:translateY(10px) scale(0.8); opacity:0.6; }
  80%    { transform:translateY(18px) scale(0.5); opacity:0; }
}
@keyframes hdl-drift {
  0%  { transform:translateX(0);   }
  50% { transform:translateX(-5px); }
  100%{ transform:translateX(0);   }
}

.heading { animation: slide-in-t 0.8s ease-out 0.1s both; }
.liver   { animation: liver-pulse 3s ease-in-out infinite; }
.flow1   { animation: flow-arrow 1.8s linear infinite; }
.flow2   { animation: flow-arrow 1.8s linear infinite 0.4s; }
.flow3   { animation: flow-arrow 1.8s linear infinite 0.8s; }

/* TG droplets from VLDL */
.tg-v1 { animation: tg-float-1 2.4s ease-out infinite 0s; }
.tg-v2 { animation: tg-float-2 2.4s ease-out infinite 0.7s; }
.tg-v3 { animation: tg-float-3 2.4s ease-out infinite 1.3s; }

/* TG droplets from IDL */
.tg-i1 { animation: tg-float-1 2.8s ease-out infinite 0.4s; }
.tg-i2 { animation: tg-float-2 2.8s ease-out infinite 1.1s; }

/* LDL docking animation */
.ldl-dock { animation: ldl-dock 2.2s ease-in-out infinite; }

/* ApoB ring animation */
.apob-ring-v { animation: apob-spin 6s linear infinite; }
.apob-ring-i { animation: apob-spin 7s linear infinite 1s; }
.apob-ring-l { animation: apob-spin 8s linear infinite 2s; }

/* HDL */
.hdl-drift { animation: hdl-drift 3s ease-in-out infinite; }

/* panel labels */
.panel-l { animation: slide-in-l 0.7s ease-out 1.0s both; }
.panel-r { animation: slide-in-r 0.7s ease-out 1.2s both; }
.quote   { animation: slide-in-t 0.8s ease-out 1.6s both; }
</style>

<!-- BG -->
<rect width="720" height="440" fill="url(#bg)"/>

<!-- Heading -->
<g class="heading">
  <text x="360" y="24" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="7.5" letter-spacing="0.16em" fill="#304870">
    LIPID TRANSPORT · DAVE FELDMAN · BIOCHEMISTRY
  </text>
  <text x="360" y="48" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="17" font-style="italic" fill="#8ab0d8">
    From VLDL to LDL: How your liver packages and delivers fat
  </text>
</g>

<!-- ══════════ LIVER ══════════ -->
<g class="liver">
  <!-- liver glow -->
  <ellipse cx="72" cy="170" rx="55" ry="55" fill="#3a1880" opacity="0.2" filter="url(#blur5)"/>
  <!-- liver blob -->
  <path d="M 42 150 Q 44 128 60 122 Q 78 116 92 126 Q 108 118 114 132 Q 124 148 118 168 Q 128 184 120 198 Q 110 214 92 212 Q 74 218 58 208 Q 40 196 38 178 Q 34 162 42 150 Z"
    fill="url(#liver-fill)" stroke="#5020a0" stroke-width="1.5"/>
  <text x="80" y="162" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="11" font-style="italic" fill="#c0a0f0">Liver</text>
  <text x="80" y="176" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.06em" fill="#8060b0">HEPATOCYTE</text>
</g>

<!-- arrow: liver → VLDL -->
<path d="M 124 168 L 172 168" stroke="#3858a0" stroke-width="1.5" fill="none"
  stroke-dasharray="5 3" stroke-linecap="round"/>
<path d="M 168 164 L 174 168 L 168 172" fill="none" stroke="#4870b8" stroke-width="1.5"/>

<!-- ══════════ VLDL ══════════ -->
<!-- glow -->
<circle cx="222" cy="168" r="50" fill="#d09020" opacity="0.07" filter="url(#blur5)"/>
<!-- body -->
<circle cx="222" cy="168" r="44" fill="url(#vldl-fill)" filter="url(#glow-s)"/>
<!-- TG dots inside -->
<circle cx="210" cy="160" r="5" fill="#ffe090" opacity="0.7"/>
<circle cx="228" cy="155" r="4" fill="#ffd870" opacity="0.6"/>
<circle cx="218" cy="176" r="6" fill="#ffdf80" opacity="0.65"/>
<circle cx="235" cy="172" r="4" fill="#ffd060" opacity="0.6"/>
<circle cx="206" cy="178" r="3" fill="#ffe898" opacity="0.55"/>
<!-- ApoB ring -->
<circle class="apob-ring-v" cx="222" cy="168" r="44"
  fill="none" stroke="#fff8e0" stroke-width="2" stroke-dasharray="12 6" opacity="0.5"/>
<!-- label inside -->
<text x="222" y="165" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="9" font-weight="bold" letter-spacing="0.06em" fill="#fff8e0">VLDL</text>
<text x="222" y="177" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6" fill="#ffe8a0" opacity="0.85">ApoB-100</text>

<!-- TG droplets floating off VLDL -->
<g class="tg-v1"><circle cx="222" cy="128" r="5" fill="#ffe090" filter="url(#glow-s)"/>
  <text x="222" y="126" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="5" fill="#a07020">TG</text></g>
<g class="tg-v2"><circle cx="236" cy="132" r="4" fill="#ffd870" filter="url(#glow-s)"/>
  <text x="236" y="130" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="5" fill="#a07020">TG</text></g>
<g class="tg-v3"><circle cx="210" cy="126" r="3.5" fill="#ffe090" filter="url(#glow-s)"/>
  <text x="210" y="124" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="4.5" fill="#a07020">TG</text></g>

<!-- LPL label (enzyme stripping TGs) -->
<text x="222" y="105" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.5" letter-spacing="0.08em" fill="#708090">LPL</text>
<text x="222" y="114" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="5.5" fill="#506070">strips TG</text>

<!-- below VLDL -->
<text x="222" y="222" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="9" font-style="italic" fill="#c09030">Very Low Density</text>
<text x="222" y="233" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.5" letter-spacing="0.06em" fill="#806020">TG-RICH · LARGE · FRESHLY MADE</text>

<!-- arrow: VLDL → IDL -->
<path class="flow1"
  d="M 268 168 L 318 168" stroke="#4870b0" stroke-width="1.8" fill="none"
  stroke-dasharray="6 4" stroke-linecap="round"/>
<path d="M 314 164 L 320 168 L 314 172" fill="none" stroke="#5880c0" stroke-width="1.5"/>

<!-- ══════════ IDL ══════════ -->
<circle cx="352" cy="168" r="28" fill="#d09020" opacity="0.07" filter="url(#blur5)"/>
<circle cx="352" cy="168" r="28" fill="url(#idl-fill)" filter="url(#glow-s)"/>
<!-- fewer TG dots -->
<circle cx="344" cy="162" r="3.5" fill="#ffe090" opacity="0.55"/>
<circle cx="358" cy="158" r="3"   fill="#ffd870" opacity="0.5"/>
<circle cx="348" cy="175" r="3"   fill="#ffdf80" opacity="0.5"/>
<!-- ApoB ring -->
<circle class="apob-ring-i" cx="352" cy="168" r="28"
  fill="none" stroke="#fff0d0" stroke-width="1.8" stroke-dasharray="9 5" opacity="0.45"/>
<text x="352" y="166" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="9" font-weight="bold" letter-spacing="0.06em" fill="#fff0d0">IDL</text>
<text x="352" y="177" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="5.5" fill="#ffe0a0" opacity="0.8">ApoB-100</text>

<!-- TG droplets from IDL -->
<g class="tg-i1"><circle cx="352" cy="144" r="4" fill="#ffe090" filter="url(#glow-s)"/>
  <text x="352" y="142" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="4.5" fill="#a07020">TG</text></g>
<g class="tg-i2"><circle cx="363" cy="148" r="3.5" fill="#ffd870" filter="url(#glow-s)"/>
  <text x="363" y="146" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="4" fill="#a07020">TG</text></g>

<!-- LPL -->
<text x="352" y="107" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.08em" fill="#708090">LPL</text>
<text x="352" y="115" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="5" fill="#506070">more TG stripped</text>

<!-- below IDL -->
<text x="352" y="208" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="9" font-style="italic" fill="#b07828">Intermediate</text>
<text x="352" y="219" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.2" letter-spacing="0.06em" fill="#806028">TRANSITIONAL · SHRINKING</text>

<!-- arrow: IDL → LDL -->
<path class="flow2"
  d="M 382 168 L 430 168" stroke="#4870b0" stroke-width="1.8" fill="none"
  stroke-dasharray="6 4" stroke-linecap="round"/>
<path d="M 426 164 L 432 168 L 426 172" fill="none" stroke="#5880c0" stroke-width="1.5"/>

<!-- ══════════ LDL ══════════ -->
<g class="ldl-dock">
  <circle cx="460" cy="168" r="18" fill="#c07020" opacity="0.1" filter="url(#blur5)"/>
  <circle cx="460" cy="168" r="17" fill="url(#ldl-fill)" filter="url(#glow-s)"/>
  <!-- cholesterol-rich interior, no TG -->
  <circle cx="457" cy="165" r="3" fill="#f0d080" opacity="0.6"/>
  <circle cx="464" cy="170" r="2.5" fill="#e8c060" opacity="0.55"/>
  <!-- ApoB ring -->
  <circle class="apob-ring-l" cx="460" cy="168" r="17"
    fill="none" stroke="#ffe0c0" stroke-width="1.5" stroke-dasharray="7 4" opacity="0.5"/>
  <text x="460" y="166" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="8" font-weight="bold" letter-spacing="0.05em" fill="#ffe0c0">LDL</text>
  <text x="460" y="175" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="5" fill="#ffd0a0" opacity="0.8">ApoB-100</text>
</g>

<!-- below LDL -->
<text x="460" y="198" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="9" font-style="italic" fill="#b06028">Low Density</text>
<text x="460" y="209" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.06em" fill="#804820">CHOL-RICH · SMALL · DENSE</text>

<!-- arrow: LDL → receptor -->
<path class="flow3"
  d="M 479 165 Q 510 155 540 158" stroke="#4870b0" stroke-width="1.8" fill="none"
  stroke-dasharray="5 4" stroke-linecap="round"/>
<path d="M 536 154 L 542 158 L 537 163" fill="none" stroke="#5880c0" stroke-width="1.5"/>

<!-- ══════════ CELL / LDL RECEPTOR ══════════ -->
<!-- cell membrane -->
<rect x="548" y="135" width="80" height="90" rx="8" fill="url(#cell-fill)" stroke="#2a5080" stroke-width="1.5" opacity="0.85"/>
<text x="588" y="150" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.06em" fill="#4070a0">LIVER CELL</text>

<!-- LDL receptor stalk -->
<rect x="576" y="155" width="8" height="35" rx="4" fill="#40a0d0" opacity="0.7"/>
<!-- receptor binding pocket -->
<path d="M 564 170 Q 574 164 580 172 Q 574 180 564 174 Z" fill="#60c0e0" opacity="0.8" filter="url(#glow-s)"/>
<text x="588" y="172" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.05em" fill="#60c8e8">LDL-R</text>
<text x="588" y="181" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="5.2" fill="#4090b0">receptor</text>

<!-- Internalized LDL (endosome) -->
<circle cx="593" cy="205" r="7" fill="#b06020" opacity="0.5"/>
<text x="593" y="208" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="5" fill="#ffd090" opacity="0.7">↓</text>
<text x="610" y="210" text-anchor="start"
  font-family="'IBM Plex Mono',monospace" font-size="5.5" fill="#4890b8">recycled</text>

<!-- return arrow: cell → liver label -->
<path d="M 548 190 Q 350 250 124 192" stroke="#2a5090" stroke-width="1" fill="none"
  stroke-dasharray="4 5" opacity="0.5" stroke-linecap="round"/>
<text x="340" y="248" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6" fill="#304870" letter-spacing="0.06em">cholesterol returned · receptor recycled</text>

<!-- ══════════ HDL (ApoA-1) ══════════ -->
<g class="hdl-drift" transform="translate(0,0)">
  <circle cx="130" cy="260" r="16" fill="#40d8c0" opacity="0.1" filter="url(#blur2)"/>
  <circle cx="130" cy="260" r="14" fill="url(#hdl-fill)" filter="url(#glow-s)"/>
  <text x="130" y="258" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="7.5" font-weight="bold" fill="#a0fff0">HDL</text>
  <text x="130" y="268" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="5" fill="#60d0c0">ApoA-1</text>
</g>
<text x="130" y="285" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="8.5" font-style="italic" fill="#2090a0">Reverse transport</text>
<text x="130" y="295" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="5.5" letter-spacing="0.06em" fill="#186080">SCAVENGES CHOL → LIVER</text>

<!-- ══════════ BOTTOM PANELS ══════════ -->

<!-- Divider line -->
<line x1="30" y1="316" x2="690" y2="316" stroke="#141e30" stroke-width="1"/>

<!-- LEFT PANEL: ApoB = particle -->
<g class="panel-l">
  <rect x="28" y="325" width="320" height="95" rx="8" fill="#0a1228" stroke="#1a2c48" stroke-width="1"/>
  <text x="188" y="343" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="12" font-style="italic" fill="#8ab0e0">ApoB = the particle</text>
  <!-- 3 particles each with 1 ApoB dot -->
  <circle cx="80"  cy="375" r="22" fill="url(#vldl-fill)" opacity="0.8"/>
  <circle cx="80"  cy="375" r="22" fill="none" stroke="#fff0d0" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
  <circle cx="80"  cy="375" r="5"  fill="#fff8e0" filter="url(#glow-s)"/>
  <text x="80"  y="407" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.5" fill="#c09030">VLDL · 1 ApoB</text>

  <circle cx="190" cy="375" r="14" fill="url(#idl-fill)" opacity="0.8"/>
  <circle cx="190" cy="375" r="14" fill="none" stroke="#ffe0d0" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.6"/>
  <circle cx="190" cy="375" r="5"  fill="#fff8e0" filter="url(#glow-s)"/>
  <text x="190" y="407" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.5" fill="#b07828">IDL · 1 ApoB</text>

  <circle cx="285" cy="375" r="9"  fill="url(#ldl-fill)" opacity="0.8"/>
  <circle cx="285" cy="375" r="9"  fill="none" stroke="#ffd0c0" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <circle cx="285" cy="375" r="5"  fill="#fff8e0" filter="url(#glow-s)"/>
  <text x="285" y="407" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.5" fill="#a06028">LDL · 1 ApoB</text>

  <text x="188" y="420" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.06em" fill="#405880">1 APOB PER PARTICLE — COUNTS PARTICLES, NOT CARGO</text>
</g>

<!-- RIGHT PANEL: Cholesterol = cargo -->
<g class="panel-r">
  <rect x="362" y="325" width="330" height="95" rx="8" fill="#0a1228" stroke="#1a2c48" stroke-width="1"/>
  <text x="527" y="343" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="12" font-style="italic" fill="#8ab0e0">Cholesterol = the cargo</text>

  <!-- Same 3 particles, cholesterol content varies -->
  <circle cx="420" cy="375" r="22" fill="url(#vldl-fill)" opacity="0.7"/>
  <!-- few chol dots inside VLDL -->
  <circle cx="416" cy="372" r="3.5" fill="#fff0a0" opacity="0.5"/>
  <circle cx="425" cy="379" r="3"   fill="#ffe880" opacity="0.5"/>
  <text x="420" y="407" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.5" fill="#c09030">VLDL · low chol</text>

  <circle cx="527" cy="375" r="14" fill="url(#idl-fill)" opacity="0.7"/>
  <circle cx="523" cy="372" r="3" fill="#fff0a0" opacity="0.55"/>
  <circle cx="531" cy="378" r="3.5" fill="#ffe880" opacity="0.55"/>
  <circle cx="525" cy="380" r="2.5" fill="#ffd080" opacity="0.5"/>
  <text x="527" y="407" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.5" fill="#b07828">IDL · mid chol</text>

  <circle cx="625" cy="375" r="9" fill="url(#ldl-fill)" opacity="0.75"/>
  <circle cx="622" cy="373" r="2.8" fill="#f0d060" opacity="0.7"/>
  <circle cx="628" cy="377" r="2.5" fill="#f0c840" opacity="0.7"/>
  <text x="625" y="407" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.5" fill="#a06028">LDL · high chol</text>

  <text x="527" y="420" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.06em" fill="#405880">CHOLESTEROL CONTENT VARIES — NOT THE SAME AS PARTICLE COUNT</text>
</g>
</svg>
