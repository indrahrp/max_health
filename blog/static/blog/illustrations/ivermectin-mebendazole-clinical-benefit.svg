<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<defs>
  <radialGradient id="bg-ivm" cx="50%" cy="35%" r="75%">
    <stop offset="0%" stop-color="#0c1220"/>
    <stop offset="100%" stop-color="#060c16"/>
  </radialGradient>
  <linearGradient id="cap-iv" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#2a6ab0"/>
    <stop offset="100%" stop-color="#184a80"/>
  </linearGradient>
  <linearGradient id="cap-mb" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#20a888"/>
    <stop offset="100%" stop-color="#127058"/>
  </linearGradient>
  <filter id="glow-ivm1"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow-ivm2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<style>
@keyframes drift { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
@keyframes pulse-ring { 0%{opacity:0.9; stroke-width:2;} 100%{opacity:0; stroke-width:0.4;} }
.cap-iv { animation: drift 3.4s ease-in-out infinite; }
.cap-mb { animation: drift 3.8s ease-in-out infinite 0.4s; }
.ring-1 { animation: pulse-ring 2.4s ease-out infinite; transform-origin: 360px 168px; }
.ring-2 { animation: pulse-ring 2.4s ease-out infinite 1.2s; transform-origin: 360px 168px; }
</style>

<rect width="720" height="420" fill="url(#bg-ivm)"/>

<text x="360" y="26" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" letter-spacing="0.16em" fill="#304870">CANCER · IVERMECTIN + MEBENDAZOLE · 197-PATIENT COHORT</text>
<text x="360" y="49" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="15.5" font-style="italic" fill="#8ab0d8">One daily protocol, two generic drugs, 90 days</text>

<!-- Combining capsules -->
<g class="cap-iv">
  <rect x="278" y="128" width="70" height="30" rx="15" fill="url(#cap-iv)" filter="url(#glow-ivm1)"/>
  <text x="313" y="148" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#dbe8fa">IVM 25mg</text>
</g>
<g class="cap-mb">
  <rect x="372" y="128" width="82" height="30" rx="15" fill="url(#cap-mb)" filter="url(#glow-ivm1)"/>
  <text x="413" y="148" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#dbf5ea">MBZ 250mg</text>
</g>
<circle class="ring-1" cx="360" cy="168" r="60" fill="none" stroke="#5ab0e0" stroke-width="1.4"/>
<circle class="ring-2" cx="360" cy="168" r="60" fill="none" stroke="#5ab0e0" stroke-width="1.4"/>
<text x="360" y="196" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" letter-spacing="0.06em" fill="#7088a8">ONE COMPOUNDED CAPSULE · ONCE DAILY · 90 DAYS</text>

<!-- Outcome breakdown bar -->
<text x="60" y="240" font-family="'IBM Plex Mono',monospace" font-size="8" letter-spacing="0.05em" fill="#a0a8c0">6-MONTH CLINICAL BENEFIT RATIO — 84.4%</text>

<g transform="translate(60,254)">
  <rect x="0" y="0" width="197.8" height="26" rx="4" fill="#0e1424" stroke="#3a4868" stroke-width="1"/>
  <rect x="0" y="0" width="64.6" height="26" fill="#2a9d6f" filter="url(#glow-ivm1)"/>
  <rect x="64.6" y="0" width="30.7" height="26" fill="#4fb8e0"/>
  <rect x="95.3" y="0" width="71.2" height="26" fill="#e0b84f"/>
  <rect x="166.5" y="0" width="30.7" height="26" fill="#b04848"/>
</g>

<g font-family="'IBM Plex Mono',monospace" font-size="7">
  <rect x="60" y="300" width="9" height="9" fill="#2a9d6f"/>
  <text x="74" y="308" fill="#c8d4e8">32.8% no evidence of disease</text>

  <rect x="290" y="300" width="9" height="9" fill="#4fb8e0"/>
  <text x="304" y="308" fill="#c8d4e8">15.6% regression</text>

  <rect x="60" y="320" width="9" height="9" fill="#e0b84f"/>
  <text x="74" y="328" fill="#c8d4e8">36.1% stable disease</text>

  <rect x="290" y="320" width="9" height="9" fill="#b04848"/>
  <text x="304" y="328" fill="#c8d4e8">15.6% progressed</text>
</g>

<line x1="30" y1="356" x2="690" y2="356" stroke="#141e30" stroke-width="1"/>
<text x="360" y="378" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" fill="#4a6890">Prospective observational cohort, 197 patients, 122 completed 6-month follow-up — not yet peer-reviewed.</text>
<text x="360" y="392" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" fill="#4a6890">No significant dose-response association was observed for cancer outcomes.</text>
</svg>
