<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<defs>
  <radialGradient id="bg" cx="50%" cy="60%" r="75%">
    <stop offset="0%" stop-color="#0a0c14"/>
    <stop offset="100%" stop-color="#04060c"/>
  </radialGradient>
  <radialGradient id="void-glow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#6020c0" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#6020c0" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="chest-void" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#080810" stop-opacity="1"/>
    <stop offset="100%" stop-color="#0c0c18" stop-opacity="1"/>
  </radialGradient>
  <filter id="glow-s"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow-m"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="blur10"><feGaussianBlur stdDeviation="10"/></filter>
  <filter id="blur16"><feGaussianBlur stdDeviation="16"/></filter>
</defs>

<style>
@keyframes particle-drift-1 {
  0%  { transform:translate(0,0);   opacity:0.9; }
  40% { transform:translate(-18px,-28px); opacity:0.6; }
  100%{ transform:translate(-38px,-55px); opacity:0; }
}
@keyframes particle-drift-2 {
  0%  { transform:translate(0,0);   opacity:0.8; }
  40% { transform:translate(22px,-24px); opacity:0.5; }
  100%{ transform:translate(46px,-50px); opacity:0; }
}
@keyframes particle-drift-3 {
  0%  { transform:translate(0,0);   opacity:0.7; }
  40% { transform:translate(-8px,-32px); opacity:0.45; }
  100%{ transform:translate(-14px,-62px); opacity:0; }
}
@keyframes particle-drift-4 {
  0%  { transform:translate(0,0);   opacity:0.65; }
  40% { transform:translate(28px,-20px); opacity:0.4; }
  100%{ transform:translate(58px,-42px); opacity:0; }
}
@keyframes void-breathe {
  0%,100%{ transform:scale(1);   opacity:0.85; }
  50%    { transform:scale(1.04); opacity:1; }
}
@keyframes figure-sway {
  0%,100%{ transform:translateX(0); }
  50%    { transform:translateX(2px); }
}
@keyframes hollow-pulse {
  0%,100%{ opacity:0.8; }
  50%    { opacity:0.45; }
}
@keyframes reach-tremble {
  0%,100%{ transform:rotate(0deg); }
  30%    { transform:rotate(-4deg); }
  70%    { transform:rotate(3deg); }
}
@keyframes fade-in {
  from{ opacity:0; transform:translateY(-8px); }
  to  { opacity:1; transform:translateY(0); }
}
@keyframes stars-twinkle {
  0%,100%{ opacity:0.2; }
  50%    { opacity:0.6; }
}

.heading  { animation: fade-in 0.9s ease-out 0.1s both; }
.quote    { animation: fade-in 0.8s ease-out 1.2s both; }
.figure-g { animation: figure-sway 4s ease-in-out infinite; transform-origin: 360px 310px; }
.void-g   { animation: void-breathe 5s ease-in-out infinite; transform-origin: 360px 230px; }
.hollow   { animation: hollow-pulse 3.5s ease-in-out infinite; }
.arm-r    { animation: reach-tremble 3s ease-in-out infinite; transform-origin: 375px 268px; }

.p1 { animation: particle-drift-1 3.2s ease-out infinite 0s; }
.p2 { animation: particle-drift-2 3.6s ease-out infinite 0.6s; }
.p3 { animation: particle-drift-3 3.0s ease-out infinite 1.1s; }
.p4 { animation: particle-drift-4 3.8s ease-out infinite 0.3s; }
.p5 { animation: particle-drift-1 3.4s ease-out infinite 1.6s; }
.p6 { animation: particle-drift-2 3.2s ease-out infinite 0.9s; }
.p7 { animation: particle-drift-3 4.0s ease-out infinite 1.8s; }

.s1 { animation: stars-twinkle 2.8s ease-in-out infinite 0s; }
.s2 { animation: stars-twinkle 3.5s ease-in-out infinite 0.7s; }
.s3 { animation: stars-twinkle 2.2s ease-in-out infinite 1.3s; }
.s4 { animation: stars-twinkle 4.1s ease-in-out infinite 0.4s; }
.s5 { animation: stars-twinkle 3.0s ease-in-out infinite 1.9s; }
</style>

<!-- BG -->
<rect width="720" height="420" fill="url(#bg)"/>

<!-- distant stars -->
<circle class="s1" cx="80"  cy="60"  r="1.2" fill="#8080c0"/>
<circle class="s2" cx="150" cy="40"  r="0.9" fill="#9090d0"/>
<circle class="s3" cx="580" cy="55"  r="1.1" fill="#8090c0"/>
<circle class="s4" cx="640" cy="80"  r="0.8" fill="#a0a0d0"/>
<circle class="s5" cx="220" cy="75"  r="1.0" fill="#8080c0"/>
<circle class="s1" cx="490" cy="45"  r="0.9" fill="#9090c0"/>
<circle class="s3" cx="680" cy="120" r="1.2" fill="#8080b0"/>
<circle class="s2" cx="40"  cy="130" r="0.8" fill="#a0a0c0"/>

<!-- void ambient glow -->
<ellipse cx="360" cy="230" rx="160" ry="130" fill="url(#void-glow)"/>

<!-- heading -->
<g class="heading">
  <text x="360" y="28" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="7.5" letter-spacing="0.16em" fill="#2a2a50">
    GABOR MATÉ · THE HUNGRY GHOST · EMOTIONAL VOID
  </text>
  <text x="360" y="54" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="19" font-style="italic" fill="#7060a8">
    Why You Feel Empty
  </text>
  <text x="360" y="74" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="12" font-style="italic" fill="#4a3870">
    and why nothing seems to fill it
  </text>
</g>

<!-- light particles drifting away (can't be caught) -->
<g class="p1"><circle cx="290" cy="200" r="4" fill="#c0a0ff" filter="url(#glow-s)"/></g>
<g class="p2"><circle cx="310" cy="185" r="3" fill="#d0b0ff" filter="url(#glow-s)"/></g>
<g class="p3"><circle cx="360" cy="175" r="3.5" fill="#b890f0" filter="url(#glow-s)"/></g>
<g class="p4"><circle cx="400" cy="190" r="3" fill="#c8a0ff" filter="url(#glow-s)"/></g>
<g class="p5"><circle cx="330" cy="195" r="2.5" fill="#d0b8ff" filter="url(#glow-s)"/></g>
<g class="p6"><circle cx="390" cy="180" r="4" fill="#b880f0" filter="url(#glow-s)"/></g>
<g class="p7"><circle cx="350" cy="170" r="2.5" fill="#c8b0ff" filter="url(#glow-s)"/></g>

<!-- figure body -->
<g class="figure-g">
  <!-- legs -->
  <rect x="350" y="310" width="10" height="50" rx="5" fill="#2a2240" opacity="0.85"/>
  <rect x="366" y="310" width="10" height="50" rx="5" fill="#2a2240" opacity="0.85"/>

  <!-- torso -->
  <path d="M 340 255 Q 338 290 348 310 L 378 310 Q 388 290 386 255 Z"
    fill="#2a2240" opacity="0.9"/>

  <!-- hollow chest void -->
  <g class="hollow">
    <ellipse cx="363" cy="280" rx="18" ry="22" fill="#060610"/>
    <ellipse cx="363" cy="280" rx="14" ry="18" fill="#04040c"/>
    <ellipse cx="363" cy="280" rx="10" ry="14" fill="#020208"/>
    <!-- void inner glow (dark purple) -->
    <ellipse cx="363" cy="280" rx="18" ry="22" fill="none" stroke="#4020a0" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- shoulders / neck -->
  <rect x="346" y="248" width="34" height="12" rx="6" fill="#2a2240" opacity="0.9"/>
  <rect x="357" y="236" width="12" height="14" rx="6" fill="#2a2240" opacity="0.9"/>

  <!-- head -->
  <ellipse cx="363" cy="225" rx="20" ry="22" fill="#2a2240" opacity="0.9"/>
  <!-- face: eyes looking upward -->
  <ellipse cx="356" cy="220" rx="3" ry="2.5" fill="#080810"/>
  <ellipse cx="370" cy="220" rx="3" ry="2.5" fill="#080810"/>
  <!-- slight upward gaze reflection -->
  <circle cx="357" cy="219" r="1" fill="#8070b8" opacity="0.6"/>
  <circle cx="371" cy="219" r="1" fill="#8070b8" opacity="0.6"/>

  <!-- left arm (down, hanging) -->
  <path d="M 342 262 Q 328 275 326 292" stroke="#2a2240" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- right arm (reaching upward toward escaping light) -->
  <g class="arm-r">
    <path d="M 384 262 Q 400 248 408 232" stroke="#2a2240" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- hand reaching -->
    <circle cx="410" cy="230" r="6" fill="#2a2240" opacity="0.85"/>
  </g>
</g>

<!-- ground shadow -->
<ellipse cx="363" cy="362" rx="42" ry="8" fill="#1a1230" opacity="0.5" filter="url(#blur4)"/>

<!-- faint label: hungry ghost -->
<text x="160" y="290" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="9" font-style="italic" fill="#3a2858" opacity="0.8">hungry ghost —</text>
<text x="160" y="303" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="9" font-style="italic" fill="#3a2858" opacity="0.8">always reaching,</text>
<text x="160" y="316" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="9" font-style="italic" fill="#3a2858" opacity="0.8">never filled</text>

<!-- arrow pointing to void chest -->
<path d="M 220 295 Q 265 282 342 280" stroke="#3a2858" stroke-width="0.8" fill="none" stroke-dasharray="3 4" opacity="0.5"/>
<text x="550" y="285" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="7" letter-spacing="0.06em" fill="#3a2858" opacity="0.7">the void</text>
<text x="550" y="295" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="7" letter-spacing="0.06em" fill="#3a2858" opacity="0.7">inside</text>
<path d="M 524 289 Q 480 283 385 280" stroke="#3a2858" stroke-width="0.8" fill="none" stroke-dasharray="3 4" opacity="0.5"/>

<!-- quote strip -->
<g class="quote">
  <rect x="0" y="388" width="720" height="32" fill="#04060c"/>
  <text x="360" y="408" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="11" font-style="italic" fill="#6050a0">
    "The emptiness always goes back to what we didn't get when we were very small." — Gabor Maté
  </text>
</g>
</svg>
