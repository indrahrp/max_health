<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<defs>
  <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a0f2e" stop-opacity="1"/>
    <stop offset="100%" stop-color="#060810" stop-opacity="1"/>
  </radialGradient>
  <radialGradient id="shame-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#8b3a8b" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#8b3a8b" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="seen-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e0a030" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#e0a030" stop-opacity="0"/>
  </radialGradient>
  <filter id="blur-soft">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
</defs>

<style>
/* ─── Cycle phases rotate around centre ─── */
@keyframes orbit-1 { 0%{transform:rotate(0deg) translateX(130px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(130px) rotate(-360deg)} }
@keyframes orbit-2 { 0%{transform:rotate(90deg) translateX(130px) rotate(-90deg)} 100%{transform:rotate(450deg) translateX(130px) rotate(-450deg)} }
@keyframes orbit-3 { 0%{transform:rotate(180deg) translateX(130px) rotate(-180deg)} 100%{transform:rotate(540deg) translateX(130px) rotate(-540deg)} }
@keyframes orbit-4 { 0%{transform:rotate(270deg) translateX(130px) rotate(-270deg)} 100%{transform:rotate(630deg) translateX(130px) rotate(-630deg)} }

/* ─── Centre figure breathing ─── */
@keyframes breathe { 0%,100%{transform:scale(1);opacity:0.85} 50%{transform:scale(1.06);opacity:1} }

/* ─── Shame cloud pulse ─── */
@keyframes shame-pulse { 0%,100%{opacity:0.12;r:58} 50%{opacity:0.3;r:70} }

/* ─── Ring spin ─── */
@keyframes ring-spin { from{stroke-dashoffset:0} to{stroke-dashoffset:-502} }

/* ─── Phase node highlight ─── */
@keyframes node-glow { 0%,100%{filter:drop-shadow(0 0 4px currentColor);opacity:0.7} 50%{filter:drop-shadow(0 0 16px currentColor);opacity:1} }

/* ─── Arrow pulse on ring ─── */
@keyframes arrow-drift { 0%,100%{opacity:0.3} 50%{opacity:0.9} }

/* ─── Title / label fade-in ─── */
@keyframes fade-up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ─── Word highlight ─── */
@keyframes word-glow { 0%,100%{opacity:0.7} 50%{opacity:1} }

.title-in   { animation: fade-up .9s ease-out 0.1s both; }
.sub-in     { animation: fade-up .8s ease-out 0.4s both; }
.fig-breath { animation: breathe 3.6s ease-in-out infinite; }
.shame-ring { animation: shame-pulse 3.6s ease-in-out infinite; }
.orbit-ring { stroke-dasharray: 8 6; animation: ring-spin 12s linear infinite; }

.node-1 { animation: node-glow 3s ease-in-out infinite 0s; }
.node-2 { animation: node-glow 3s ease-in-out infinite 0.75s; }
.node-3 { animation: node-glow 3s ease-in-out infinite 1.5s; }
.node-4 { animation: node-glow 3s ease-in-out infinite 2.25s; }

.phase-1 { animation: fade-up .7s ease-out 0.6s both; }
.phase-2 { animation: fade-up .7s ease-out 0.9s both; }
.phase-3 { animation: fade-up .7s ease-out 1.2s both; }
.phase-4 { animation: fade-up .7s ease-out 1.5s both; }
.bottom-in { animation: fade-up .7s ease-out 1.8s both; }
</style>

<!-- Background -->
<rect width="720" height="420" fill="url(#bg-glow)"/>

<!-- Title -->
<g class="title-in">
  <text x="360" y="34" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="9.5" letter-spacing="0.20em"
    fill="#4a3568" text-transform="uppercase">PSYCHOLOGY · PARAPHILIAS · THE WOUND UNDERNEATH</text>
  <text x="360" y="60" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="20" font-style="italic"
    fill="#e8d8ff">The person who needs to be seen — at any cost</text>
</g>

<!-- ─── CENTRE: the figure ─── -->
<g transform="translate(360,220)">
  <!-- shame glow behind -->
  <circle class="shame-ring" cx="0" cy="0" r="58" fill="url(#shame-glow)"/>

  <!-- orbit ring (dashed, spinning) -->
  <circle class="orbit-ring" cx="0" cy="0" r="130" fill="none"
    stroke="#4a3568" stroke-width="1.2" opacity="0.5"/>

  <!-- figure -->
  <g class="fig-breath">
    <!-- shadow below -->
    <ellipse cx="0" cy="52" rx="28" ry="7" fill="#000" opacity="0.5" filter="url(#blur-soft)"/>
    <!-- body -->
    <ellipse cx="0" cy="16" rx="20" ry="28" fill="#2a1a40" stroke="#7c55b0" stroke-width="1.2"/>
    <!-- head -->
    <circle cx="0" cy="-18" r="16" fill="#2a1a40" stroke="#7c55b0" stroke-width="1.2"/>
    <!-- face — blank, no features = unseen inside -->
    <circle cx="-6" cy="-20" r="3" fill="#1a0f28"/>
    <circle cx="6" cy="-20" r="3" fill="#1a0f28"/>
    <!-- small mouth, flat -->
    <path d="M -5 -10 Q 0 -8 5 -10" stroke="#5a3a80" stroke-width="1" fill="none"/>
    <!-- arms out — wanting to reach -->
    <path d="M -20 10 L -36 0" stroke="#7c55b0" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M 20 10 L 36 0" stroke="#7c55b0" stroke-width="1.4" stroke-linecap="round"/>
    <!-- hands open -->
    <circle cx="-38" cy="-1" r="4" fill="none" stroke="#7c55b0" stroke-width="1.2"/>
    <circle cx="38" cy="-1" r="4" fill="none" stroke="#7c55b0" stroke-width="1.2"/>
  </g>

  <!-- centre label -->
  <text x="0" y="60" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic"
    fill="#8b6faa">"I need you to notice me"</text>

  <!-- ─── 4 orbiting phase nodes ─── -->

  <!-- Phase 1 — TOP: Building tension (anxiety) -->
  <g class="node-1" transform="translate(0,-130)" color="#e05580">
    <circle cx="0" cy="0" r="32" fill="#1a0818" stroke="#e05580" stroke-width="1.4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8.5" letter-spacing="0.1em" fill="#e05580">TENSION</text>
    <text x="0" y="2" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#c8a0b8">anxiety builds,</text>
    <text x="0" y="14" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#c8a0b8">shame rises</text>
  </g>

  <!-- Phase 2 — RIGHT: The act -->
  <g class="node-2" transform="translate(130,0)" color="#e09030">
    <circle cx="0" cy="0" r="32" fill="#1a1008" stroke="#e09030" stroke-width="1.4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8.5" letter-spacing="0.1em" fill="#e09030">THE ACT</text>
    <text x="0" y="2" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#c8b888">forced reaction</text>
    <text x="0" y="14" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#c8b888">→ brief relief</text>
  </g>

  <!-- Phase 3 — BOTTOM: Shame crash -->
  <g class="node-3" transform="translate(0,130)" color="#6080e0">
    <circle cx="0" cy="0" r="32" fill="#080c1a" stroke="#6080e0" stroke-width="1.4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8.5" letter-spacing="0.1em" fill="#6080e0">CRASH</text>
    <text x="0" y="2" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#a0a8d8">guilt, disgust,</text>
    <text x="0" y="14" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#a0a8d8">deeper shame</text>
  </g>

  <!-- Phase 4 — LEFT: Fantasy planning -->
  <g class="node-4" transform="translate(-130,0)" color="#50c0a0">
    <circle cx="0" cy="0" r="32" fill="#08160f" stroke="#50c0a0" stroke-width="1.4"/>
    <text x="0" y="-12" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="8.5" letter-spacing="0.1em" fill="#50c0a0">FANTASY</text>
    <text x="0" y="2" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#90c8b0">urge returns,</text>
    <text x="0" y="14" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#90c8b0">mind rehearses</text>
  </g>

  <!-- Directional arrows on orbit path -->
  <path d="M 0,-108 L 8,-118 L -8,-118 Z" fill="#4a3568" opacity="0.7"/>
  <path d="M 108,0 L 118,8 L 118,-8 Z" fill="#4a3568" opacity="0.7"/>
  <path d="M 0,108 L -8,118 L 8,118 Z" fill="#4a3568" opacity="0.7"/>
  <path d="M -108,0 L -118,-8 L -118,8 Z" fill="#4a3568" opacity="0.7"/>
</g>

<!-- ─── Bottom bar ─── -->
<g class="bottom-in">
  <rect x="60" y="386" width="600" height="28" rx="6" fill="#140e22" stroke="#2a1a40" stroke-width="1"/>
  <text x="360" y="404" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="11.5" font-style="italic"
    fill="#9070c0">
    The loop breaks when the real need — to be genuinely known — can finally be met safely.
  </text>
</g>
</svg>
