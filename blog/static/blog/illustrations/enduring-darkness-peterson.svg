<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<defs>
  <radialGradient id="sky-glow" cx="78%" cy="22%" r="38%">
    <stop offset="0%" stop-color="#c87820" stop-opacity="0.22"/>
    <stop offset="60%" stop-color="#3a2060" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#060c16" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="storm-dark" cx="20%" cy="60%" r="42%">
    <stop offset="0%" stop-color="#0a0818" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#060c16" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="light-source" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e8b040" stop-opacity="0.7"/>
    <stop offset="40%" stop-color="#c87820" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#c87820" stop-opacity="0"/>
  </radialGradient>
  <filter id="blur-soft"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="blur-heavy"><feGaussianBlur stdDeviation="10"/></filter>
  <filter id="glow-filter">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
  <linearGradient id="path-grad" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#2a1a30" stop-opacity="0.8"/>
    <stop offset="50%" stop-color="#5a3a20" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#c8a060" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="figure-grad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#b09070"/>
    <stop offset="100%" stop-color="#6a4a30"/>
  </linearGradient>
</defs>

<style>
@keyframes star-pulse {
  0%,100%{ opacity: 0.15; r: 1.5; }
  50%    { opacity: 0.9; r: 2.2; }
}
@keyframes star-twinkle {
  0%,100%{ opacity: 0.4; }
  33%    { opacity: 1; }
  66%    { opacity: 0.2; }
}
@keyframes light-breathe {
  0%,100%{ opacity: 0.65; }
  50%    { opacity: 1; }
}
@keyframes storm-drift {
  0%,100%{ transform: translateX(0) translateY(0); opacity: 0.35; }
  33%    { transform: translateX(-6px) translateY(3px); opacity: 0.5; }
  66%    { transform: translateX(4px) translateY(-4px); opacity: 0.28; }
}
@keyframes figure-breathe {
  0%,100%{ transform: translateY(0); }
  50%    { transform: translateY(-2px); }
}
@keyframes path-glow {
  0%,100%{ opacity: 0.5; }
  50%    { opacity: 0.8; }
}
@keyframes text-fade-in {
  from{ opacity: 0; transform: translateY(6px); }
  to  { opacity: 1; transform: translateY(0); }
}
@keyframes cross-glow {
  0%,100%{ opacity: 0.25; }
  50%    { opacity: 0.55; }
}

.star-a { animation: star-pulse 3.2s ease-in-out infinite; }
.star-b { animation: star-twinkle 4.1s ease-in-out infinite; }
.star-c { animation: star-pulse 2.8s ease-in-out infinite 1.1s; }
.star-d { animation: star-twinkle 5s ease-in-out infinite 0.6s; }
.star-e { animation: star-pulse 3.7s ease-in-out infinite 2s; }
.star-f { animation: star-twinkle 4.5s ease-in-out infinite 1.4s; }
.star-g { animation: star-pulse 2.5s ease-in-out infinite 0.3s; }
.light-halo { animation: light-breathe 3.5s ease-in-out infinite; }
.storm-1 { animation: storm-drift 7s ease-in-out infinite; }
.storm-2 { animation: storm-drift 9s ease-in-out infinite 2s; }
.figure  { animation: figure-breathe 4s ease-in-out infinite; }
.path-line { animation: path-glow 4s ease-in-out infinite; }
.cross-shape { animation: cross-glow 4s ease-in-out infinite; }
.title-in { animation: text-fade-in 1s ease-out 0.2s both; }
.sub-in   { animation: text-fade-in 0.9s ease-out 0.7s both; }
.quote-in { animation: text-fade-in 0.8s ease-out 1.2s both; }
</style>

<!-- Background -->
<rect width="720" height="420" fill="#060c16"/>
<rect width="720" height="420" fill="url(#storm-dark)"/>
<rect width="720" height="420" fill="url(#sky-glow)"/>

<!-- Storm clouds (left / dark side) -->
<g class="storm-1">
  <ellipse cx="110" cy="200" rx="120" ry="70" fill="#0e0a1a" opacity="0.5" filter="url(#blur-heavy)"/>
  <ellipse cx="60" cy="280" rx="90" ry="55" fill="#0c0818" opacity="0.6" filter="url(#blur-heavy)"/>
</g>
<g class="storm-2">
  <ellipse cx="170" cy="310" rx="140" ry="60" fill="#100a1e" opacity="0.45" filter="url(#blur-heavy)"/>
</g>

<!-- Stars emerging top-right (the brightening sky) -->
<circle class="star-a" cx="490" cy="45"  r="1.8" fill="#e8d0a0"/>
<circle class="star-b" cx="530" cy="30"  r="1.4" fill="#e0c880"/>
<circle class="star-c" cx="580" cy="55"  r="2"   fill="#f0e0b0"/>
<circle class="star-d" cx="610" cy="25"  r="1.6" fill="#d8c080"/>
<circle class="star-e" cx="650" cy="42"  r="1.2" fill="#ffe0a0"/>
<circle class="star-f" cx="560" cy="75"  r="1.5" fill="#e8d8a8"/>
<circle class="star-g" cx="680" cy="65"  r="1.8" fill="#f0e8c0"/>
<circle class="star-b" cx="700" cy="35"  r="1.3" fill="#e0d090" style="animation-delay:2.3s"/>
<circle class="star-a" cx="420" cy="68"  r="1.4" fill="#d8c878" style="animation-delay:0.8s"/>
<circle class="star-d" cx="455" cy="32"  r="1.2" fill="#e8d090" style="animation-delay:3.1s"/>
<circle class="star-c" cx="510" cy="88"  r="1.6" fill="#f0d8a0" style="animation-delay:1.5s"/>

<!-- The light source (top right) — the "aim" / meaning -->
<g class="light-halo">
  <ellipse cx="598" cy="88" rx="75" ry="55" fill="url(#light-source)" filter="url(#blur-heavy)"/>
  <ellipse cx="598" cy="88" rx="36" ry="28" fill="#e8b040" opacity="0.18" filter="url(#blur-soft)"/>
</g>

<!-- Subtle cross/ladder shape in the glow — the upward aim symbol -->
<g class="cross-shape" transform="translate(598, 88)">
  <line x1="0" y1="-28" x2="0" y2="28" stroke="#f0d090" stroke-width="1.2" opacity="0.5"/>
  <line x1="-18" y1="-6" x2="18" y2="-6" stroke="#f0d090" stroke-width="1" opacity="0.4"/>
  <line x1="-12" y1="10" x2="12" y2="10" stroke="#f0d090" stroke-width="0.8" opacity="0.3"/>
</g>

<!-- The ascending path -->
<path class="path-line"
  d="M 60 380 Q 140 360 200 330 Q 280 295 350 255 Q 430 215 500 175 Q 560 145 598 110"
  stroke="url(#path-grad)" stroke-width="2.5" fill="none" stroke-linecap="round"
  stroke-dasharray="6 4" opacity="0.7"/>
<!-- Path shadow / ground -->
<path d="M 60 382 Q 140 362 200 332 Q 280 297 350 257 Q 430 217 500 177 Q 560 147 598 112"
  stroke="#3a2818" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"
  filter="url(#blur-soft)"/>

<!-- The figure — small, at about 40% up the path, walking upward -->
<g class="figure" transform="translate(302, 257)">
  <!-- Burden / weight on back -->
  <rect x="-5" y="-22" width="10" height="12" rx="2" fill="#3a2828" opacity="0.8"/>
  <line x1="-5" y1="-18" x2="-10" y2="-12" stroke="#4a3030" stroke-width="1.2"/>
  <line x1="5"  y1="-18" x2="10"  y2="-12" stroke="#4a3030" stroke-width="1.2"/>
  <!-- Body -->
  <line x1="0" y1="-10" x2="0" y2="12" stroke="url(#figure-grad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="0" cy="-14" r="5" fill="#8a6848" stroke="#5a4030" stroke-width="0.8"/>
  <!-- Arms — reaching slightly forward -->
  <line x1="0" y1="-4" x2="-9" y2="4" stroke="#7a5840" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="0" y1="-4" x2="9"  y2="1" stroke="#7a5840" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Legs — walking pose -->
  <line x1="0" y1="12" x2="-6" y2="28" stroke="#6a4830" stroke-width="2" stroke-linecap="round"/>
  <line x1="0" y1="12" x2="7"  y2="26" stroke="#6a4830" stroke-width="2" stroke-linecap="round"/>
  <!-- Shadow on ground -->
  <ellipse cx="2" cy="32" rx="10" ry="3" fill="#0a0614" opacity="0.6"/>
</g>

<!-- Title and quote text -->
<g class="title-in">
  <text x="360" y="30" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="8.5" letter-spacing="0.18em" fill="#3a2a18">
    JORDAN PETERSON · ON ENDURING LIFE'S DARKEST MOMENTS
  </text>
  <text x="360" y="58" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="20" font-style="italic" fill="#d4a860">
    Aim up. Trudge forward.
  </text>
</g>

<!-- Left: darkness label -->
<g class="sub-in">
  <text x="90" y="340" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#3a2840" opacity="0.8">
    chaos &amp; suffering
  </text>
  <line x1="90" y1="348" x2="90" y2="355" stroke="#3a2840" stroke-width="0.8" opacity="0.5"/>
</g>

<!-- Right: light label -->
<g class="sub-in" style="animation-delay:1s">
  <text x="610" y="155" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#c8a060" opacity="0.8">
    meaning &amp; aim
  </text>
  <line x1="610" y1="143" x2="610" y2="136" stroke="#c8a060" stroke-width="0.8" opacity="0.5"/>
</g>

<!-- Bottom quote -->
<g class="quote-in">
  <rect x="80" y="385" width="560" height="26" rx="5" fill="#08060e" stroke="#201828" stroke-width="1" opacity="0.85"/>
  <text x="360" y="402" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="11" font-style="italic" fill="#8a6840">
    "Regardless of the catastrophe of existence, I will do good." — Peterson
  </text>
</g>
</svg>
