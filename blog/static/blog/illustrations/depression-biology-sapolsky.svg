<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#0a1020"/>
    <stop offset="100%" stop-color="#060c16"/>
  </radialGradient>
  <radialGradient id="glow-l" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#2060c0" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#2060c0" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow-r" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#c03010" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#c03010" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow-lg"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
</defs>

<style>
@keyframes pulse-n {
  0%,100%{ opacity:0.35; }
  50%    { opacity:1; }
}
@keyframes fire {
  0%,100%{ r:2.5; opacity:0.5; }
  50%    { r:4.5; opacity:1; }
}
@keyframes flow {
  0%  { stroke-dashoffset:100; opacity:0.9; }
  100%{ stroke-dashoffset:0;   opacity:0.2; }
}
@keyframes cortisol-drip {
  0%  { transform:translateY(0); opacity:0; }
  20% { opacity:0.8; }
  100%{ transform:translateY(28px); opacity:0; }
}
@keyframes hippo-shrink {
  0%,100%{ opacity:0.9; transform:scale(1); }
  50%    { opacity:0.4; transform:scale(0.82); }
}
@keyframes sunset-warm {
  0%,100%{ opacity:0.8; }
  50%    { opacity:1; }
}
@keyframes sunset-cold {
  0%,100%{ opacity:0.3; }
  50%    { opacity:0.15; }
}
@keyframes slide-in {
  from{ opacity:0; transform:translateY(-8px); }
  to  { opacity:1; transform:translateY(0); }
}

.heading { animation: slide-in 0.8s ease-out 0.1s both; }
.lbl-l   { animation: slide-in 0.7s ease-out 0.8s both; }
.lbl-r   { animation: slide-in 0.7s ease-out 1.0s both; }
.quote   { animation: slide-in 0.8s ease-out 1.4s both; }

/* healthy neurons */
.na { animation: fire 1.8s ease-in-out infinite 0s; }
.nb { animation: fire 2.1s ease-in-out infinite 0.4s; }
.nc { animation: fire 1.6s ease-in-out infinite 0.7s; }
.nd { animation: fire 2.4s ease-in-out infinite 1.1s; }
.ne { animation: fire 1.9s ease-in-out infinite 0.3s; }
.nf { animation: fire 2.3s ease-in-out infinite 0.9s; }
.s1 { animation: flow 1.8s linear infinite 0s; }
.s2 { animation: flow 2.0s linear infinite 0.5s; }
.s3 { animation: flow 1.6s linear infinite 1.0s; }

/* depressed neurons */
.da { animation: pulse-n 3.4s ease-in-out infinite 0s; }
.db { animation: pulse-n 4.2s ease-in-out infinite 0.6s; }
.dc { animation: pulse-n 3.8s ease-in-out infinite 1.2s; }

.cort1 { animation: cortisol-drip 2.4s ease-in-out infinite 0s; }
.cort2 { animation: cortisol-drip 2.4s ease-in-out infinite 0.8s; }
.cort3 { animation: cortisol-drip 2.4s ease-in-out infinite 1.6s; }

.hippo-atrophy { animation: hippo-shrink 3.6s ease-in-out infinite; transform-origin: center; }

.sun-warm { animation: sunset-warm 3s ease-in-out infinite; }
.sun-cold { animation: sunset-cold 3s ease-in-out infinite; }
</style>

<!-- BG -->
<rect width="720" height="420" fill="url(#bg)"/>

<!-- ambient glow left (blue/healthy) -->
<ellipse cx="185" cy="210" rx="140" ry="130" fill="url(#glow-l)"/>
<!-- ambient glow right (red/depressed) -->
<ellipse cx="535" cy="210" rx="140" ry="130" fill="url(#glow-r)"/>

<!-- divider -->
<line x1="360" y1="68" x2="360" y2="388" stroke="#1a2840" stroke-width="1" stroke-dasharray="3 5"/>

<!-- ─── HEADING ─── -->
<g class="heading">
  <text x="360" y="28" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="8" letter-spacing="0.18em" fill="#3060a0">
    ROBERT SAPOLSKY · NEUROSCIENCE · DEPRESSION
  </text>
  <text x="360" y="54" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="17" font-style="italic" fill="#7aaee0">
    A disease whose defining symptom is the inability to feel pleasure
  </text>
</g>

<!-- ═══════════ LEFT — HEALTHY BRAIN ═══════════ -->

<!-- brain shape (healthy) -->
<path d="M 105 200 Q 92 175 96 152 Q 104 128 128 118 Q 150 108 172 116 Q 190 108 210 116 Q 232 128 238 155 Q 246 178 236 202 Q 250 218 248 243 Q 245 268 230 280 Q 216 292 200 292 Q 188 298 175 294 Q 162 298 148 290 Q 130 278 116 260 Q 100 240 102 218 Z"
  fill="#0d1828" stroke="#2a5090" stroke-width="2"/>

<!-- dopamine pathway glow -->
<path d="M 125 265 Q 140 250 158 238 Q 177 226 195 215 Q 210 202 222 188"
  stroke="#30d878" stroke-width="8" fill="none" opacity="0.12" filter="url(#blur3)" stroke-linecap="round"/>

<!-- dopamine pathway — animated signal lines -->
<path class="s1"
  d="M 125 265 Q 140 250 158 238 Q 177 226 195 215 Q 210 202 222 188"
  stroke="#30d878" stroke-width="2.2" fill="none"
  stroke-dasharray="10 5" stroke-linecap="round"/>
<path class="s2"
  d="M 130 260 Q 145 246 162 234 Q 180 222 197 212"
  stroke="#60f0a0" stroke-width="1.5" fill="none" opacity="0.6"
  stroke-dasharray="8 6" stroke-linecap="round"/>
<path class="s3"
  d="M 120 270 Q 138 254 156 242 Q 174 230 192 218 Q 207 206 218 194"
  stroke="#20b860" stroke-width="1.2" fill="none" opacity="0.4"
  stroke-dasharray="6 7" stroke-linecap="round"/>

<!-- hippocampus (healthy, glowing) -->
<path d="M 128 254 Q 122 268 130 278 Q 140 286 154 280 Q 162 274 160 262 Q 153 254 143 255 Q 135 256 128 254 Z"
  fill="#163860" stroke="#3878c8" stroke-width="1.8" opacity="0.9" filter="url(#glow)"/>
<text x="143" y="295" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.5" fill="#4888c8" letter-spacing="0.04em">hippocampus</text>

<!-- frontal cortex label (healthy) -->
<ellipse cx="185" cy="148" rx="28" ry="17" fill="#121e30" stroke="#2a5888" stroke-width="1.5" opacity="0.9"/>
<text x="185" y="145" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.2" fill="#5888c0" letter-spacing="0.04em">frontal</text>
<text x="185" y="154" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.2" fill="#5888c0" letter-spacing="0.04em">cortex</text>

<!-- neurons firing -->
<circle class="na" cx="170" cy="198" r="2.5" fill="#30e080" filter="url(#glow)"/>
<circle class="nb" cx="196" cy="192" r="2.5" fill="#50f098" filter="url(#glow)"/>
<circle class="nc" cx="162" cy="218" r="2.5" fill="#28d070" filter="url(#glow)"/>
<circle class="nd" cx="210" cy="216" r="2.5" fill="#38e08a" filter="url(#glow)"/>
<circle class="ne" cx="184" cy="228" r="2.5" fill="#50f098" filter="url(#glow)"/>
<circle class="nf" cx="178" cy="168" r="2"   fill="#60f0a0" filter="url(#glow)"/>

<!-- neuron glow halos -->
<circle cx="170" cy="198" r="7" fill="#30d878" opacity="0.06" filter="url(#blur3)"/>
<circle cx="196" cy="192" r="7" fill="#50f098" opacity="0.06" filter="url(#blur3)"/>

<!-- sunset (healthy — visible and warm) -->
<g class="sun-warm" transform="translate(108,308)">
  <rect width="70" height="42" rx="6" fill="#0a1624" stroke="#1e3a60" stroke-width="1"/>
  <rect x="2" y="2" width="66" height="38" rx="5" fill="#08121e"/>
  <!-- sky -->
  <rect x="2" y="2" width="66" height="15" rx="5" fill="#203060" opacity="0.7"/>
  <rect x="2" y="16" width="66" height="12" fill="#d06020" opacity="0.35"/>
  <!-- horizon glow -->
  <ellipse cx="35" cy="30" rx="26" ry="10" fill="#e07018" opacity="0.6" filter="url(#blur3)"/>
  <line x1="2" y1="30" x2="68" y2="30" stroke="#1e3860" stroke-width="0.8"/>
  <!-- sun -->
  <circle cx="35" cy="30" r="8" fill="#f0a020" filter="url(#glow)"/>
</g>
<text x="143" y="360" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="8.5" font-style="italic" fill="#5888b8">can feel it</text>

<!-- DOPAMINE label -->
<text x="185" y="310" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="7" letter-spacing="0.08em" fill="#30a060">DOPAMINE ↑</text>

<!-- ═══════════ RIGHT — DEPRESSED BRAIN ═══════════ -->

<!-- brain shape (depressed) -->
<path d="M 375 200 Q 362 175 366 152 Q 374 128 398 118 Q 420 108 442 116 Q 460 108 480 116 Q 502 128 508 155 Q 516 178 506 202 Q 520 218 518 243 Q 515 268 500 280 Q 486 292 470 292 Q 458 298 445 294 Q 432 298 418 290 Q 400 278 386 260 Q 370 240 372 218 Z"
  fill="#0e0c10" stroke="#3a1820" stroke-width="2"/>

<!-- cortisol flood haze -->
<ellipse cx="445" cy="148" rx="60" ry="35" fill="#c03010" opacity="0.08" filter="url(#blur8)"/>

<!-- cortisol drip label -->
<text x="445" y="128" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="8" letter-spacing="0.1em" fill="#d04020">CORTISOL ↑↑</text>

<!-- cortisol drip droplets (animated, falling) -->
<g>
  <circle class="cort1" cx="420" cy="140" r="2.8" fill="#e05030"/>
  <circle class="cort2" cx="445" cy="138" r="3.2" fill="#d04020"/>
  <circle class="cort3" cx="470" cy="142" r="2.5" fill="#e05030"/>
</g>

<!-- hippocampus (atrophied — shrinks and fades) -->
<g class="hippo-atrophy">
  <path d="M 398 254 Q 392 268 400 278 Q 410 286 424 280 Q 432 274 430 262 Q 423 254 413 255 Q 405 256 398 254 Z"
    fill="#1a0c0c" stroke="#702020" stroke-width="1.5" opacity="0.8"/>
</g>
<text x="413" y="295" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.5" fill="#803030" letter-spacing="0.04em">atrophied</text>

<!-- frontal cortex (underactive) -->
<ellipse cx="455" cy="148" rx="28" ry="17" fill="#100c0e" stroke="#3a1a1a" stroke-width="1.5" opacity="0.8"/>
<text x="455" y="145" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.2" fill="#604040" letter-spacing="0.04em">frontal</text>
<text x="455" y="154" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="6.2" fill="#604040" letter-spacing="0.04em">cortex</text>

<!-- depressed neurons — barely firing -->
<circle class="da" cx="440" cy="198" r="2.5" fill="#703030"/>
<circle class="db" cx="466" cy="192" r="2.5" fill="#603030"/>
<circle class="dc" cx="432" cy="218" r="2.5" fill="#703030"/>
<circle cx="480" cy="216" r="2" fill="#502020" opacity="0.2"/>
<circle cx="454" cy="228" r="2" fill="#602828" opacity="0.2"/>

<!-- dopamine pathway — dead -->
<path d="M 395 265 Q 410 250 428 238 Q 447 226 465 215 Q 480 202 492 188"
  stroke="#402020" stroke-width="1.5" fill="none" opacity="0.2"
  stroke-dasharray="5 8" stroke-linecap="round"/>

<!-- sunset (depressed — grey and cold) -->
<g class="sun-cold" transform="translate(378,308)">
  <rect width="70" height="42" rx="6" fill="#070608" stroke="#201018" stroke-width="1"/>
  <rect x="2" y="2" width="66" height="38" rx="5" fill="#060508"/>
  <rect x="2" y="2" width="66" height="15" rx="5" fill="#101018" opacity="0.6"/>
  <ellipse cx="35" cy="30" rx="26" ry="10" fill="#302828" opacity="0.4"/>
  <line x1="2" y1="30" x2="68" y2="30" stroke="#201010" stroke-width="0.8"/>
  <circle cx="35" cy="30" r="8" fill="#353030" opacity="0.5"/>
</g>
<text x="413" y="360" text-anchor="middle"
  font-family="'IBM Plex Serif',Georgia,serif" font-size="8.5" font-style="italic" fill="#704040">can't feel it</text>

<!-- CORTISOL label -->
<text x="455" y="310" text-anchor="middle"
  font-family="'IBM Plex Mono',monospace" font-size="7" letter-spacing="0.08em" fill="#a03020">ANHEDONIA ↑</text>

<!-- ─── LABELS ─── -->
<g class="lbl-l">
  <text x="185" y="378" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="13" font-style="italic" fill="#5090d0">healthy brain</text>
  <text x="185" y="393" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="6.8" letter-spacing="0.1em" fill="#305878">REWARD · PLEASURE · MEMORY</text>
</g>
<g class="lbl-r">
  <text x="455" y="378" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="13" font-style="italic" fill="#b05050">major depression</text>
  <text x="455" y="393" text-anchor="middle"
    font-family="'IBM Plex Mono',monospace" font-size="6.8" letter-spacing="0.1em" fill="#783838">CORTISOL · ATROPHY · ANHEDONIA</text>
</g>

<!-- ─── QUOTE STRIP ─── -->
<g class="quote">
  <rect x="0" y="403" width="720" height="17" rx="0" fill="#04080f"/>
  <text x="360" y="415" text-anchor="middle"
    font-family="'IBM Plex Serif',Georgia,serif" font-size="10.5" font-style="italic" fill="#607090">
    "Depression is a biochemical disorder where somebody can't appreciate sunsets." — Sapolsky
  </text>
</g>
</svg>
