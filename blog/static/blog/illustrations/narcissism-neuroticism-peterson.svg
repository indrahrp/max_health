<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<style>
  @keyframes pulse-n { 0%,100%{opacity:0.35;r:46} 50%{opacity:0.7;r:52} }
  @keyframes pulse-narc { 0%,100%{opacity:0.3;r:42} 50%{opacity:0.65;r:48} }
  @keyframes drift-n { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes drift-narc { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
  @keyframes fade-in { from{opacity:0} to{opacity:1} }
  @keyframes line-draw { from{stroke-dashoffset:120} to{stroke-dashoffset:0} }
  @keyframes arrow-in { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  @keyframes glow { 0%,100%{filter:drop-shadow(0 0 6px #a387ff55)} 50%{filter:drop-shadow(0 0 18px #a387ffaa)} }
  @keyframes glow-red { 0%,100%{filter:drop-shadow(0 0 6px #e05555)} 50%{filter:drop-shadow(0 0 18px #e05555cc)} }
  @keyframes tick-in { from{stroke-dashoffset:30} to{stroke-dashoffset:0} }

  .bg { fill: #060c16; }
  .label-mono { font-family: 'IBM Plex Mono', monospace; }
  .label-serif { font-family: 'IBM Plex Serif', Georgia, serif; }
  .label-sans { font-family: 'IBM Plex Sans', system-ui, sans-serif; }

  .neuro-ring { animation: pulse-n 3.2s ease-in-out infinite; }
  .narc-ring  { animation: pulse-narc 3.8s ease-in-out infinite 0.6s; }
  .neuro-fig  { animation: drift-n 3.2s ease-in-out infinite; }
  .narc-fig   { animation: drift-narc 3.8s ease-in-out infinite 0.6s; }

  .connector  { stroke-dasharray:120; animation: line-draw 1.4s cubic-bezier(.6,.05,.2,1) 0.8s both; }
  .row-1      { animation: arrow-in .5s ease-out 1.2s both; }
  .row-2      { animation: arrow-in .5s ease-out 1.5s both; }
  .row-3      { animation: arrow-in .5s ease-out 1.8s both; }
  .row-4      { animation: arrow-in .5s ease-out 2.1s both; }
  .title-in   { animation: fade-in .9s ease-out 0.1s both; }
  .left-in    { animation: fade-in .7s ease-out 0.3s both; }
  .right-in   { animation: fade-in .7s ease-out 0.5s both; }

  .neuro-glow { animation: glow 3.2s ease-in-out infinite; }
  .narc-glow  { animation: glow-red 3.8s ease-in-out infinite 0.6s; }

  .tick { stroke-dasharray:30; animation: tick-in 0.5s ease-out both; }
  .tick-1 { animation-delay: 2.2s; }
  .tick-2 { animation-delay: 2.4s; }
  .tick-3 { animation-delay: 2.6s; }
  .tick-4 { animation-delay: 2.8s; }
</style>

<!-- Background -->
<rect class="bg" width="720" height="420"/>

<!-- Subtle radial wash -->
<radialGradient id="wash-n" cx="27%" cy="50%" r="40%">
  <stop offset="0%" stop-color="#a387ff" stop-opacity="0.12"/>
  <stop offset="100%" stop-color="#a387ff" stop-opacity="0"/>
</radialGradient>
<radialGradient id="wash-narc" cx="73%" cy="50%" r="40%">
  <stop offset="0%" stop-color="#e05555" stop-opacity="0.1"/>
  <stop offset="100%" stop-color="#e05555" stop-opacity="0"/>
</radialGradient>
<rect width="720" height="420" fill="url(#wash-n)"/>
<rect width="720" height="420" fill="url(#wash-narc)"/>

<!-- Title row -->
<g class="title-in">
  <text x="360" y="36" text-anchor="middle" class="label-mono" font-size="10" letter-spacing="0.18em" fill="#5a5a7a" text-transform="uppercase">JORDAN PETERSON · BIG FIVE PERSONALITY RESEARCH</text>
  <text x="360" y="68" text-anchor="middle" class="label-serif" font-size="22" fill="#f4f4f8" font-style="italic">Neuroticism vs Narcissism</text>
  <text x="360" y="90" text-anchor="middle" class="label-mono" font-size="10" letter-spacing="0.12em" fill="#5a5a7a">two failures of the self — opposite poles</text>
</g>

<!-- ─── LEFT: NEUROTICISM ─── -->
<g class="left-in">
  <!-- Figure glow -->
  <g class="neuro-glow" transform="translate(148,240)">
    <circle class="neuro-ring" cx="0" cy="0" r="46" fill="none" stroke="#a387ff" stroke-width="1.2" opacity="0.35"/>
    <circle cx="0" cy="-28" r="18" fill="#a387ff22" stroke="#a387ff" stroke-width="1.4"/>
    <!-- head -->
    <circle cx="0" cy="-28" r="10" fill="#a387ff44"/>
    <!-- body -->
    <path d="M -12 -14 Q 0 -4 12 -14 L 10 18 Q 0 24 -10 18 Z" fill="#a387ff33" stroke="#a387ff" stroke-width="1"/>
    <!-- arms raised/tense -->
    <path d="M -12 -8 L -26 2" stroke="#a387ff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M 12 -8 L 26 2" stroke="#a387ff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <!-- legs -->
    <path d="M -6 18 L -8 36" stroke="#a387ff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M 6 18 L 8 36" stroke="#a387ff" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  </g>

  <text x="148" y="300" text-anchor="middle" class="label-sans" font-size="14" font-weight="600" fill="#a387ff">NEUROTICISM</text>
  <text x="148" y="316" text-anchor="middle" class="label-serif" font-size="11" fill="#8a8a9a" font-style="italic">too much self-focus inward</text>

  <!-- Traits list -->
  <g transform="translate(30,328)">
    <text x="0" y="0" class="label-serif" font-size="12" fill="#c8c8d4">· Anxiety &amp; negative emotion</text>
    <text x="0" y="16" class="label-serif" font-size="12" fill="#c8c8d4">· Rumination, catastrophising</text>
    <text x="0" y="32" class="label-serif" font-size="12" fill="#c8c8d4">· Threat-sensitivity overactive</text>
    <text x="0" y="48" class="label-serif" font-size="12" fill="#c8c8d4">· Victim stance, withdrawal</text>
  </g>
</g>

<!-- ─── RIGHT: NARCISSISM ─── -->
<g class="right-in">
  <g class="narc-glow" transform="translate(572,240)">
    <circle class="narc-ring" cx="0" cy="0" r="42" fill="none" stroke="#e05555" stroke-width="1.2" opacity="0.3"/>
    <!-- figure expanded/dominant -->
    <circle cx="0" cy="-28" r="10" fill="#e0555544"/>
    <path d="M -14 -14 Q 0 -2 14 -14 L 12 18 Q 0 26 -12 18 Z" fill="#e0555533" stroke="#e05555" stroke-width="1"/>
    <!-- arms spread wide / dominant -->
    <path d="M -14 -6 L -32 -14" stroke="#e05555" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M 14 -6 L 32 -14" stroke="#e05555" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M -6 18 L -8 36" stroke="#e05555" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M 6 18 L 8 36" stroke="#e05555" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <!-- crown/halo -->
    <path d="M -16 -42 L -10 -34 L 0 -40 L 10 -34 L 16 -42" stroke="#e05555" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <text x="572" y="300" text-anchor="middle" class="label-sans" font-size="14" font-weight="600" fill="#e05555">NARCISSISM</text>
  <text x="572" y="316" text-anchor="middle" class="label-serif" font-size="11" fill="#8a8a9a" font-style="italic">too much self-focus outward</text>

  <g transform="translate(454,328)">
    <text x="0" y="0" class="label-serif" font-size="12" fill="#c8c8d4">· Grandiosity &amp; entitlement</text>
    <text x="0" y="16" class="label-serif" font-size="12" fill="#c8c8d4">· Lack of empathy, exploit others</text>
    <text x="0" y="32" class="label-serif" font-size="12" fill="#c8c8d4">· Fragile ego, rage at criticism</text>
    <text x="0" y="48" class="label-serif" font-size="12" fill="#c8c8d4">· Mask of confidence, no depth</text>
  </g>
</g>

<!-- ─── Centre connector ─── -->
<line class="connector" x1="214" y1="240" x2="506" y2="240" stroke="#3a3a55" stroke-width="1.2" stroke-dasharray="120"/>
<text x="360" y="234" text-anchor="middle" class="label-mono" font-size="10" letter-spacing="0.12em" fill="#5a5a7a">SAME ROOT</text>
<circle cx="360" cy="240" r="28" fill="#0e0e18" stroke="#3a3a55" stroke-width="1"/>
<text x="360" y="236" text-anchor="middle" class="label-sans" font-size="9" fill="#8a8a9a">failed</text>
<text x="360" y="249" text-anchor="middle" class="label-sans" font-size="9" fill="#8a8a9a">self-dev.</text>

<!-- Peterson prescription row -->
<g class="row-1" transform="translate(0, 0)">
  <line x1="180" y1="108" x2="540" y2="108" stroke="#2a2a38" stroke-width="1"/>
  <text x="360" y="104" text-anchor="middle" class="label-mono" font-size="10" letter-spacing="0.14em" fill="#5a5a7a">PETERSON'S PRESCRIPTION</text>
  <text x="360" y="125" text-anchor="middle" class="label-serif" font-size="13" fill="#c8c8d4" font-style="italic">"The antidote to both is voluntary responsibility and the pursuit of meaning."</text>
</g>

<!-- Bottom prescription chips -->
<g class="row-2">
  <rect x="96" y="148" width="118" height="26" rx="13" fill="#a387ff18" stroke="#a387ff44" stroke-width="1"/>
  <text x="155" y="165" text-anchor="middle" class="label-mono" font-size="10" letter-spacing="0.06em" fill="#a387ffcc">Take up your burden</text>
</g>
<g class="row-3">
  <rect x="301" y="148" width="118" height="26" rx="13" fill="#26c2c918" stroke="#26c2c944" stroke-width="1"/>
  <text x="360" y="165" text-anchor="middle" class="label-mono" font-size="10" letter-spacing="0.06em" fill="#26c2c9cc">Tell the truth precisely</text>
</g>
<g class="row-4">
  <rect x="506" y="148" width="118" height="26" rx="13" fill="#e0557518" stroke="#e0557544" stroke-width="1"/>
  <text x="565" y="165" text-anchor="middle" class="label-mono" font-size="10" letter-spacing="0.06em" fill="#e05575cc">Compare with yourself</text>
</g>
</svg>
