<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<defs>
  <radialGradient id="bg-g" cx="50%" cy="40%" r="70%">
    <stop offset="0%" stop-color="#0c1220"/>
    <stop offset="100%" stop-color="#060c16"/>
  </radialGradient>
  <radialGradient id="liver-fill-g" cx="45%" cy="38%" r="60%">
    <stop offset="0%" stop-color="#6030c0"/>
    <stop offset="70%" stop-color="#3a1880"/>
    <stop offset="100%" stop-color="#1c0840"/>
  </radialGradient>
  <radialGradient id="fat-fill" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#f0c860"/>
    <stop offset="60%" stop-color="#c89830"/>
    <stop offset="100%" stop-color="#8a6414"/>
  </radialGradient>
  <radialGradient id="mol-fill-g" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#ffd868"/>
    <stop offset="60%" stop-color="#e0a838"/>
    <stop offset="100%" stop-color="#a87418"/>
  </radialGradient>
  <filter id="glow-g1"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<style>
@keyframes organ-pulse { 0%,100%{opacity:0.85;} 50%{opacity:1;} }
@keyframes arrow-flow-g { 0%{stroke-dashoffset:30;opacity:0.3;} 100%{stroke-dashoffset:0;opacity:0.9;} }
@keyframes bar-drop { 0%,100%{transform:scaleY(1);} 50%{transform:scaleY(0.5);} }
@keyframes bar-rise { 0%,100%{transform:scaleY(0.5);} 50%{transform:scaleY(1);} }
@keyframes fat-shrink { 0%,100%{transform:scale(1);} 50%{transform:scale(0.82);} }
.organ { animation: organ-pulse 3.2s ease-in-out infinite; }
.flow-g { animation: arrow-flow-g 1.8s linear infinite; }
.bar-down { animation: bar-drop 2.6s ease-in-out infinite; transform-origin: bottom; }
.bar-up { animation: bar-rise 2.6s ease-in-out infinite; transform-origin: bottom; }
.fat-cell { animation: fat-shrink 3.4s ease-in-out infinite; transform-origin: center; }
</style>

<rect width="720" height="420" fill="url(#bg-g)"/>

<text x="360" y="26" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" letter-spacing="0.16em" fill="#304870">METABOLISM · BEN BIKMAN · METABOLIC CLASSROOM</text>
<text x="360" y="49" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="15.5" font-style="italic" fill="#8ab0d8">Binding FXR links ivermectin to glucose and insulin</text>

<!-- Liver/intestine with FXR -->
<g class="organ">
  <path d="M 90 160 Q 92 138 108 132 Q 126 126 140 136 Q 156 128 162 142 Q 172 158 166 178 Q 176 194 168 208 Q 158 224 140 222 Q 122 228 106 218 Q 88 206 86 188 Q 82 172 90 160 Z"
    fill="url(#liver-fill-g)" stroke="#5020a0" stroke-width="1.5"/>
  <text x="126" y="178" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10" font-style="italic" fill="#c0a0f0">Liver / gut</text>
  <text x="126" y="192" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.05em" fill="#8060b0">FXR-EXPRESSING TISSUE</text>
</g>

<!-- FXR receptor + ivermectin -->
<circle cx="220" cy="175" r="15" fill="url(#mol-fill-g)" filter="url(#glow-g1)"/>
<text x="220" y="178" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" font-weight="bold" fill="#3a2408">IVM</text>
<path d="M 205 175 L 178 175" stroke="#e0a838" stroke-width="1.5" stroke-dasharray="3 2"/>
<text x="220" y="155" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.5" letter-spacing="0.04em" fill="#c8a030">binds FXR</text>
<text x="220" y="200" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" fill="#8878a8">farnesoid X receptor</text>
<text x="220" y="211" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" fill="#8878a8">(the bile-acid receptor)</text>

<!-- arrows to two outcomes -->
<path class="flow-g" d="M 232 185 Q 280 220 320 250" stroke="#4870b0" stroke-width="1.6" fill="none" stroke-dasharray="6 4"/>
<path class="flow-g" d="M 232 165 Q 300 130 380 120" stroke="#4870b0" stroke-width="1.6" fill="none" stroke-dasharray="6 4" style="animation-delay:0.4s"/>

<!-- fasting glucose / insulin bars -->
<rect x="320" y="255" width="150" height="110" rx="10" fill="#0e1424" stroke="#3a4868" stroke-width="1.2"/>
<text x="395" y="278" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10.5" font-style="italic" fill="#d0d8e8">Rodent models</text>

<text x="350" y="298" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" fill="#a0a8c0">glucose</text>
<rect x="342" y="303" width="16" height="45" rx="3" fill="none" stroke="#3a4868" stroke-width="1"/>
<rect class="bar-down" x="344" y="305" width="12" height="41" rx="2" fill="#e07050"/>

<text x="440" y="298" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" fill="#a0a8c0">insulin sens.</text>
<rect x="432" y="303" width="16" height="45" rx="3" fill="none" stroke="#3a4868" stroke-width="1"/>
<rect class="bar-up" x="434" y="305" width="12" height="41" rx="2" fill="#50c090"/>

<text x="395" y="362" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="5.8" letter-spacing="0.04em" fill="#607890">fasting glucose ↓ · insulin sensitivity ↑</text>

<!-- adipocyte panel -->
<rect x="500" y="90" width="170" height="150" rx="10" fill="#0e1424" stroke="#3a4868" stroke-width="1.2"/>
<text x="585" y="112" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10.5" font-style="italic" fill="#d0d8e8">Fat cells (in vitro)</text>

<g class="fat-cell">
  <circle cx="585" cy="170" r="42" fill="url(#fat-fill)" filter="url(#glow-g1)" opacity="0.85"/>
  <circle cx="572" cy="160" r="9" fill="#fff0c0" opacity="0.4"/>
  <circle cx="598" cy="180" r="7" fill="#fff0c0" opacity="0.35"/>
  <text x="585" y="174" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" font-weight="bold" fill="#4a3408">adipocyte</text>
</g>
<text x="585" y="225" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" fill="#a08840">via PPAR-γ</text>
<text x="585" y="237" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.04em" fill="#607890">fewer new fat cells form</text>

<line x1="30" y1="355" x2="290" y2="355" stroke="#141e30" stroke-width="1"/>
<line x1="30" y1="380" x2="690" y2="380" stroke="#141e30" stroke-width="1"/>
<text x="360" y="404" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" fill="#4a6890">Evidence here is preclinical — rodent studies plus one small human pilot (4 patients) — not large clinical trials.</text>
</svg>
