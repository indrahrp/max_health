<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
<defs>
  <radialGradient id="bg-o" cx="50%" cy="40%" r="70%">
    <stop offset="0%" stop-color="#0c1220"/>
    <stop offset="100%" stop-color="#060c16"/>
  </radialGradient>
  <radialGradient id="soil-fill" cx="45%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#3a2a18"/>
    <stop offset="100%" stop-color="#1c1408"/>
  </radialGradient>
  <radialGradient id="mol-fill" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#f0c040"/>
    <stop offset="60%" stop-color="#d09020"/>
    <stop offset="100%" stop-color="#a06010"/>
  </radialGradient>
  <radialGradient id="mol2-fill" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#ffd868"/>
    <stop offset="60%" stop-color="#e0a838"/>
    <stop offset="100%" stop-color="#a87418"/>
  </radialGradient>
  <filter id="glow-o1"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow-o2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<style>
@keyframes colony-pulse { 0%,100%{opacity:0.75;} 50%{opacity:1;} }
@keyframes drift { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
@keyframes flow { 0%{stroke-dashoffset:40;opacity:0.3;} 100%{stroke-dashoffset:0;opacity:0.85;} }
@keyframes medal-glow { 0%,100%{opacity:0.7;} 50%{opacity:1;} }
.colony { animation: colony-pulse 3.2s ease-in-out infinite; }
.mol-drift { animation: drift 3.6s ease-in-out infinite; }
.flow-a { animation: flow 1.8s linear infinite; }
.flow-b { animation: flow 1.8s linear infinite 0.5s; }
.medal { animation: medal-glow 2.6s ease-in-out infinite; }
</style>

<rect width="720" height="420" fill="url(#bg-o)"/>

<text x="360" y="26" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7.5" letter-spacing="0.16em" fill="#304870">ORIGIN · BEN BIKMAN · METABOLIC CLASSROOM</text>
<text x="360" y="49" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="16" font-style="italic" fill="#8ab0d8">From soil bacterium to Nobel Prize</text>

<!-- Soil / petri dish -->
<g class="colony">
  <ellipse cx="115" cy="230" rx="80" ry="46" fill="url(#soil-fill)" stroke="#4a3418" stroke-width="1.5"/>
  <circle cx="90" cy="218" r="9" fill="#6a5024" opacity="0.8"/>
  <circle cx="130" cy="210" r="7" fill="#785a28" opacity="0.75"/>
  <circle cx="108" cy="240" r="10" fill="#6a5024" opacity="0.8"/>
  <circle cx="145" cy="238" r="6" fill="#7a5c2a" opacity="0.7"/>
  <circle cx="75" cy="240" r="6" fill="#644c20" opacity="0.7"/>
</g>
<text x="115" y="288" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="10.5" font-style="italic" fill="#a08850">Soil sample, Japan · 1975</text>
<text x="115" y="301" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.5" letter-spacing="0.06em" fill="#6a5024">STREPTOMYCES AVERMITILIS</text>

<!-- arrow 1 -->
<path class="flow-a" d="M 205 225 L 262 225" stroke="#4870b0" stroke-width="1.8" fill="none" stroke-dasharray="6 4" stroke-linecap="round"/>
<path d="M 258 221 L 264 225 L 258 229" fill="none" stroke="#5880c0" stroke-width="1.5"/>

<!-- Avermectin molecule -->
<g class="mol-drift">
  <circle cx="320" cy="210" r="46" fill="url(#mol-fill)" opacity="0.15" filter="url(#glow-o2)"/>
  <circle cx="320" cy="210" r="40" fill="url(#mol-fill)" filter="url(#glow-o1)"/>
  <circle cx="320" cy="210" r="40" fill="none" stroke="#fff8e0" stroke-width="1.6" stroke-dasharray="10 5" opacity="0.5"/>
  <text x="320" y="207" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="bold" fill="#fff8e0">Avermectin</text>
  <text x="320" y="220" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" fill="#ffe8a0" opacity="0.85">anti-parasitic compound</text>
</g>

<!-- arrow 2 -->
<path class="flow-b" d="M 372 210 L 430 210" stroke="#4870b0" stroke-width="1.8" fill="none" stroke-dasharray="6 4" stroke-linecap="round"/>
<path d="M 426 206 L 432 210 L 426 214" fill="none" stroke="#5880c0" stroke-width="1.5"/>
<text x="401" y="198" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.05em" fill="#607890">chemically modified</text>

<!-- Ivermectin molecule -->
<g class="mol-drift" style="animation-delay:0.6s">
  <circle cx="500" cy="210" r="50" fill="url(#mol2-fill)" opacity="0.18" filter="url(#glow-o2)"/>
  <circle cx="500" cy="210" r="44" fill="url(#mol2-fill)" filter="url(#glow-o1)"/>
  <circle cx="500" cy="210" r="44" fill="none" stroke="#fffbe8" stroke-width="1.8" stroke-dasharray="11 5" opacity="0.55"/>
  <text x="500" y="206" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11.5" font-weight="bold" fill="#fffbe8">Ivermectin</text>
  <text x="500" y="220" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6.2" fill="#fff0b0" opacity="0.9">more potent derivative</text>
</g>

<!-- arrow 3 -->
<path d="M 550 200 Q 585 170 610 165" stroke="#4870b0" stroke-width="1.5" fill="none" stroke-dasharray="5 4" opacity="0.7"/>
<path d="M 605 162 L 612 165 L 607 170" fill="none" stroke="#5880c0" stroke-width="1.5"/>

<!-- Nobel medal -->
<g class="medal">
  <circle cx="640" cy="145" r="34" fill="#3a2c08" stroke="#c8a030" stroke-width="2"/>
  <circle cx="640" cy="145" r="27" fill="none" stroke="#e8c860" stroke-width="1" opacity="0.7"/>
  <text x="640" y="141" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="9" font-weight="bold" fill="#f0d888">NOBEL</text>
  <text x="640" y="152" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" fill="#e0c070">2015</text>
</g>
<text x="640" y="192" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="6" letter-spacing="0.04em" fill="#806828">Physiology or Medicine</text>

<!-- bottom caption -->
<line x1="30" y1="330" x2="690" y2="330" stroke="#141e30" stroke-width="1"/>
<text x="360" y="358" text-anchor="middle" font-family="'IBM Plex Serif',Georgia,serif" font-size="12" font-style="italic" fill="#8ab0e0">A humanitarian drug, not a livestock footnote</text>
<text x="360" y="382" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" fill="#4a6890">Recognized for radically lowering river blindness and lymphatic filariasis worldwide —</text>
<text x="360" y="396" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="7" fill="#4a6890">139 million people reached in 2014 alone, per the WHO.</text>
</svg>
