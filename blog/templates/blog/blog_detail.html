{% extends 'blog/base.html' %}

{% block title %}{{ post.title }} — Indra Choki{% endblock %}

{% block content %}
<div class="wrap">
  <div style="margin-bottom:2rem;">
    <a href="{% url 'blog:blog_list' %}" style="font-size:0.85rem;color:var(--warm-accent);text-decoration:none;">← Back to writing</a>
  </div>
  <span class="tag" style="margin-bottom:1rem;display:inline-block;">{{ post.tag }}</span>
  <h1 style="font-family:var(--serif);font-size:clamp(1.6rem,4vw,2.2rem);font-weight:normal;color:var(--warm-text);margin-bottom:1rem;line-height:1.3;">{{ post.title }}</h1>
  <div class="post-meta" style="margin-bottom:2rem;">{{ post.created_at|date:"F j, Y" }}</div>
  <hr style="border:none;border-top:1px solid var(--warm-border);margin-bottom:2rem;">
  <div class="post-content">
    {{ post.content|linebreaks }}
  </div>
</div>
{% endblock %}
