<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Indra Choki{% endblock %}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --warm-bg: #fdf8f3;
    --warm-surface: #fff9f4;
    --warm-accent: #c2714f;
    --warm-accent-light: #f5e6de;
    --warm-text: #2c2016;
    --warm-muted: #7a6555;
    --warm-border: rgba(194,113,79,0.2);
    --serif: 'Georgia', 'Times New Roman', serif;
    --sans: system-ui, -apple-system, sans-serif;
  }
  body {
    font-family: var(--sans);
    background: var(--warm-bg);
    color: var(--warm-text);
    line-height: 1.7;
  }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(253,248,243,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--warm-border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .nav-logo {
    font-family: var(--serif);
    font-size: 1.2rem;
    color: var(--warm-accent);
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    font-size: 0.9rem;
    color: var(--warm-muted);
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--warm-accent); }
  .wrap { max-width: 700px; margin: 0 auto; padding: 4rem 2rem; }
  .section-label {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--warm-accent);
    margin-bottom: 1.5rem;
    font-weight: 600;
  }
  .post-card {
    display: block;
    text-decoration: none;
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--warm-border);
    transition: opacity 0.2s;
  }
  .post-card:hover { opacity: 0.75; }
  .post-meta { font-size: 0.8rem; color: var(--warm-muted); margin-bottom: 0.3rem; }
  .post-card h3 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: normal;
    color: var(--warm-text);
    margin-bottom: 0.4rem;
  }
  .post-card p { font-size: 0.95rem; color: var(--warm-muted); }
  .tag {
    display: inline-block;
    font-size: 0.72rem;
    background: var(--warm-accent-light);
    color: var(--warm-accent);
    padding: 2px 10px;
    border-radius: 1rem;
    margin-top: 0.6rem;
  }
  .project-card {
    background: var(--warm-surface);
    border: 1px solid var(--warm-border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
    transition: box-shadow 0.2s;
  }
  .project-card:hover { box-shadow: 0 4px 16px rgba(194,113,79,0.1); }
  .project-card h3 {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: normal;
    color: var(--warm-text);
    margin-bottom: 0.4rem;
  }
  .project-card p { font-size: 0.95rem; color: var(--warm-muted); margin-bottom: 0.8rem; }
  .project-link {
    font-size: 0.82rem;
    color: var(--warm-accent);
    text-decoration: none;
    border-bottom: 1px solid var(--warm-accent);
    padding-bottom: 1px;
  }
  .btn {
    padding: 0.6rem 1.4rem;
    border-radius: 2rem;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid var(--warm-accent);
    text-decoration: none;
    display: inline-block;
  }
  .btn-primary { background: var(--warm-accent); color: #fff; }
  .btn-primary:hover { background: #a85a38; }
  .btn-outline { background: transparent; color: var(--warm-accent); }
  .btn-outline:hover { background: var(--warm-accent-light); }
  footer {
    max-width: 700px; margin: 0 auto;
    padding: 2.5rem 2rem;
    border-top: 1px solid var(--warm-border);
    display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 1rem;
  }
  footer p { font-size: 0.85rem; color: var(--warm-muted); }
  .footer-links { display: flex; gap: 1.2rem; }
  .footer-links a { font-size: 0.85rem; color: var(--warm-muted); text-decoration: none; }
  .footer-links a:hover { color: var(--warm-accent); }
  .post-content { font-size: 1.05rem; color: var(--warm-muted); line-height: 1.9; }
  .post-content p { margin-bottom: 1.2rem; }
  .post-content h1,.post-content h2,.post-content h3 { font-family: var(--serif); font-weight: normal; color: var(--warm-text); margin: 2rem 0 0.8rem; }
  .post-content h2 { font-size: 1.5rem; }
  .post-content h3 { font-size: 1.2rem; }
  .post-content ul,.post-content ol { padding-left: 1.5rem; margin-bottom: 1.2rem; }
  .post-content li { margin-bottom: 0.4rem; }
  .post-content blockquote { border-left: 3px solid var(--warm-accent); margin: 1.5rem 0; padding: 0.5rem 1.2rem; color: var(--warm-muted); font-family: var(--serif); font-size: 1.1rem; }
  .post-content img { max-width: 100%; border-radius: 8px; margin: 1.5rem 0; }
  .post-content a { color: var(--warm-accent); }
  .post-content strong { color: var(--warm-text); font-weight: 500; }
  .star-filled { color: #c2714f; }
  .star-empty { color: var(--warm-border); }
  h2.page-title {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: normal;
    margin-bottom: 2rem;
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="{% url 'blog:home' %}">Indra Choki</a>
  <ul class="nav-links">
    <li><a href="{% url 'blog:about' %}">About</a></li>
    <li><a href="{% url 'blog:blog_list' %}">Blog</a></li>
    <li><a href="{% url 'topics:topics_home' %}">Topics</a></li>
    <li><a href="{% url 'blog:book_list' %}">Books</a></li>
    <li><a href="{% url 'blog:projects' %}">Work</a></li>
  </ul>
</nav>

{% block content %}{% endblock %}

<footer>
  <p>© 2026 Indra Choki</p>
  <div class="footer-links">
    <a href="#">Twitter</a>
    <a href="#">Substack</a>
    <a href="#">Email</a>
  </div>
</footer>

</body>
</html>
