<script>
    function aiImprove(mode) {
      var status = document.getElementById('ai-status');
    
      // Find the summernote iframe
      var iframe = document.querySelector('.note-editable');
      var iframeEl = document.querySelector('.note-editing-area iframe');
    
      // Get content directly from the editable div inside iframe
      var content = '';
      var editableDiv = null;
    
      try {
        // Summernote uses a contenteditable div inside an iframe
        var noteIframe = document.querySelector('iframe.note-editing-area') ||
                         document.querySelector('.note-editing-area iframe');
        if (noteIframe) {
          var iDoc = noteIframe.contentDocument || noteIframe.contentWindow.document;
          editableDiv = iDoc.querySelector('.note-editable');
          if (editableDiv) content = editableDiv.innerHTML;
        }
      } catch(e) {}
    
      // Fallback to jQuery summernote API
      if (!content || content === '<p><br></p>') {
        try { content = $('.django-summernote-widget').summernote('code'); } catch(e) {}
      }
    
      // Fallback to hidden textarea
      if (!content || content === '<p><br></p>') {
        var ta = document.querySelector('textarea[name="content"]');
        if (ta) content = ta.value;
      }
    
      if (!content || content.trim() === '' || content === '<p><br></p>') {
        status.textContent = '⚠ Editor is empty';
        return;
      }
    
      // Strip HTML for plain text
      var tmp = document.createElement('div');
      tmp.innerHTML = content;
      var plainText = (tmp.innerText || tmp.textContent || '').trim();
    
      if (!plainText) { status.textContent = '⚠ No text found'; return; }
    
      status.textContent = '⏳ Asking Claude...';
    
      var csrfToken = '';
      var csrfCookie = document.cookie.match(/csrftoken=([^;]+)/);
      if (csrfCookie) csrfToken = csrfCookie[1];
      if (!csrfToken) {
        var csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
        if (csrfInput) csrfToken = csrfInput.value;
      }
    
      fetch('/ai/improve/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ text: plainText, mode: mode })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.result) {
          status.textContent = '✗ Error: ' + (data.error || 'unknown');
          return;
        }
    
        var result = data.result;
        var done = false;
    
        // Method 1 — write directly into the iframe contenteditable div
        try {
          var noteIframe = document.querySelector('iframe.note-editing-area') ||
                           document.querySelector('.note-editing-area iframe');
          if (noteIframe) {
            var iDoc = noteIframe.contentDocument || noteIframe.contentWindow.document;
            var editable = iDoc.querySelector('.note-editable');
            if (editable) {
              editable.innerHTML = result;
              // also sync back to hidden textarea
              var ta = document.querySelector('textarea[name="content"]');
              if (ta) ta.value = result;
              done = true;
            }
          }
        } catch(e) { console.log('iframe method failed', e); }
    
        // Method 2 — use jQuery summernote API
        if (!done) {
          try {
            $('.django-summernote-widget').summernote('code', result);
            done = true;
          } catch(e) { console.log('summernote api failed', e); }
        }
    
        // Method 3 — direct textarea (requires manual refresh)
        if (!done) {
          var ta = document.querySelector('textarea[name="content"]');
          if (ta) {
            ta.value = result;
            status.textContent = '✓ Done! (scroll up to see changes)';
            setTimeout(function(){ status.textContent = ''; }, 4000);
            return;
          }
        }
    
        if (done) {
          status.textContent = '✓ Done!';
          setTimeout(function(){ status.textContent = ''; }, 3000);
        }
      })
      .catch(function(err) {
        status.textContent = '✗ Request failed';
        console.error(err);
      });
    }
    </script>
