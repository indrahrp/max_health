{% extends "admin/change_form.html" %}

{% block after_field_sets %}
{{ block.super }}
<div id="ai-toolbar" style="margin:1rem 0;padding:1rem;background:#fdf8f3;
     border:1px solid #e0c8a0;border-radius:8px;">
  <strong style="font-size:0.9rem;">AI Writing Assistant</strong>
  <div style="display:flex;gap:0.5rem;margin-top:0.6rem;flex-wrap:wrap;">
    <button type="button" onclick="aiImprove('improve')"
            style="padding:5px 14px;background:#c2714f;color:#fff;border:none;
                   border-radius:4px;cursor:pointer;font-size:0.82rem;">
      ✨ Improve
    </button>
    <button type="button" onclick="aiImprove('fix')"
            style="padding:5px 14px;background:#4a7a5a;color:#fff;border:none;
                   border-radius:4px;cursor:pointer;font-size:0.82rem;">
      ✓ Fix grammar
    </button>
    <button type="button" onclick="aiImprove('simplify')"
            style="padding:5px 14px;background:#4a6a8a;color:#fff;border:none;
                   border-radius:4px;cursor:pointer;font-size:0.82rem;">
      ↓ Simplify
    </button>
    <button type="button" onclick="aiImprove('expand')"
            style="padding:5px 14px;background:#7a5a8a;color:#fff;border:none;
                   border-radius:4px;cursor:pointer;font-size:0.82rem;">
      ↑ Expand
    </button>
    <span id="ai-status" style="font-size:0.82rem;color:#7a6555;
          align-self:center;margin-left:0.5rem;"></span>
  </div>

  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-top:0.6rem;
              padding-top:0.6rem;border-top:1px solid #e8d4b8;">
    <button type="button" id="voice-btn" onclick="toggleVoice()"
            style="padding:5px 14px;background:#8b5e3c;color:#fff;border:none;
                   border-radius:4px;cursor:pointer;font-size:0.82rem;">
      🎤 Dictate
    </button>
    <span style="font-size:0.78rem;color:#9a7a60;">Speak to compose — Claude will polish your words</span>
  </div>

  <div id="voice-panel" style="display:none;margin-top:0.6rem;">
    <div id="voice-preview"
         style="min-height:3rem;padding:0.6rem 0.8rem;background:#fff;border:1px solid #d4b898;
                border-radius:4px;font-size:0.85rem;color:#3a2010;line-height:1.5;
                font-style:italic;white-space:pre-wrap;max-height:8rem;overflow-y:auto;">
    </div>
    <div id="voice-actions" style="display:none;margin-top:0.4rem;gap:0.4rem;display:flex;">
      <button type="button" onclick="polishAndInsert()"
              style="padding:5px 14px;background:#c2714f;color:#fff;border:none;
                     border-radius:4px;cursor:pointer;font-size:0.82rem;">
        ✨ Polish &amp; Insert
      </button>
      <button type="button" onclick="insertRaw()"
              style="padding:5px 14px;background:#7a7a7a;color:#fff;border:none;
                     border-radius:4px;cursor:pointer;font-size:0.82rem;">
        Insert as-is
      </button>
      <button type="button" onclick="clearVoice()"
              style="padding:5px 10px;background:#e8e0d8;color:#5a4030;border:none;
                     border-radius:4px;cursor:pointer;font-size:0.82rem;">
        Clear
      </button>
    </div>
  </div>
</div>

<script>
function aiImprove(mode) {
  var status = document.getElementById('ai-status');

  // get content from summernote
  var content = '';
  if (typeof $ !== 'undefined' && $('.django-summernote-widget').length) {
    content = $('.django-summernote-widget').summernote('code');
  } else {
    var textarea = document.querySelector('textarea[name="content"]');
    if (textarea) content = textarea.value;
  }

  if (!content || content === '<p><br></p>') {
    status.textContent = '⚠ No content to improve';
    return;
  }

  status.textContent = '⏳ Thinking...';

  // strip HTML for plain text processing
  var tmp = document.createElement('div');
  tmp.innerHTML = content;
  var plainText = tmp.innerText || tmp.textContent;

  fetch('/ai/improve/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': document.cookie.match(/csrftoken=([^;]+)/)[1]
    },
    body: JSON.stringify({ text: plainText, mode: mode })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.result) {
      // set back into summernote
      if (typeof $ !== 'undefined' && $('.django-summernote-widget').length) {
        $('.django-summernote-widget').summernote('code', data.result);
      } else {
        var textarea = document.querySelector('textarea[name="content"]');
        if (textarea) textarea.value = data.result;
      }
      status.textContent = '✓ Done!';
      setTimeout(function(){ status.textContent = ''; }, 3000);
    } else {
      status.textContent = '✗ Error: ' + (data.error || 'unknown');
    }
  })
  .catch(function(err) {
    status.textContent = '✗ Failed — check API key';
    console.error(err);
  });
}

// ── Voice Dictation ────────────────────────────────────────────────────────
var _voiceRec = null;
var _voiceText = '';
var _voiceActive = false;

function toggleVoice() {
  if (_voiceActive) { _stopVoice(); } else { _startVoice(); }
}

function _startVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('ai-status').textContent = '✗ Voice requires Chrome or Edge';
    return;
  }
  _voiceText = '';
  _voiceRec = new SR();
  _voiceRec.continuous = true;
  _voiceRec.interimResults = true;
  _voiceRec.lang = 'en-US';

  _voiceRec.onresult = function(e) {
    var interim = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) { _voiceText += e.results[i][0].transcript + ' '; }
      else { interim += e.results[i][0].transcript; }
    }
    document.getElementById('voice-preview').textContent = _voiceText + interim;
  };

  _voiceRec.onerror = function(e) {
    document.getElementById('ai-status').textContent = '✗ Mic error: ' + e.error;
    _setVoiceStopped();
  };

  _voiceRec.onend = function() {
    if (_voiceActive) _voiceRec.start();
  };

  _voiceRec.start();
  _voiceActive = true;
  var btn = document.getElementById('voice-btn');
  btn.textContent = '⏹ Stop';
  btn.style.background = '#c0392b';
  document.getElementById('ai-status').textContent = '🔴 Listening…';
  document.getElementById('voice-panel').style.display = 'block';
  document.getElementById('voice-actions').style.display = 'none';
}

function _stopVoice() {
  _voiceActive = false;
  if (_voiceRec) { _voiceRec.stop(); _voiceRec = null; }
  _setVoiceStopped();
}

function _setVoiceStopped() {
  var btn = document.getElementById('voice-btn');
  btn.textContent = '🎤 Dictate';
  btn.style.background = '#8b5e3c';
  document.getElementById('ai-status').textContent = '';
  if (_voiceText.trim()) {
    document.getElementById('voice-actions').style.display = 'flex';
  }
}

function _appendToEditor(text) {
  var html = '<p>' + text.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
  var done = false;
  if (typeof $ !== 'undefined' && $('.django-summernote-widget').length) {
    var current = $('.django-summernote-widget').summernote('code') || '';
    $('.django-summernote-widget').summernote('code', current + html);
    done = true;
  }
  if (!done) {
    var ta = document.querySelector('textarea[name="content"]');
    if (ta) { ta.value += '\n\n' + text; done = true; }
  }
  return done;
}

function polishAndInsert() {
  if (!_voiceText.trim()) return;
  var status = document.getElementById('ai-status');
  status.textContent = '⏳ Polishing with Claude…';

  var csrfToken = '';
  var m = document.cookie.match(/csrftoken=([^;]+)/);
  if (m) csrfToken = m[1];
  if (!csrfToken) { var ci = document.querySelector('[name=csrfmiddlewaretoken]'); if (ci) csrfToken = ci.value; }

  fetch('/ai/improve/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
    body: JSON.stringify({ text: _voiceText, mode: 'voice' })
  })
  .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(function(data) {
    if (!data.result) { status.textContent = '✗ ' + (data.error || 'Error'); return; }
    _appendToEditor(data.result);
    clearVoice();
    status.textContent = '✓ Inserted!';
    setTimeout(function(){ status.textContent = ''; }, 3000);
  })
  .catch(function() { status.textContent = '✗ Request failed'; });
}

function insertRaw() {
  if (!_voiceText.trim()) return;
  _appendToEditor(_voiceText.trim());
  clearVoice();
  document.getElementById('ai-status').textContent = '✓ Inserted!';
  setTimeout(function(){ document.getElementById('ai-status').textContent = ''; }, 2000);
}

function clearVoice() {
  _voiceText = '';
  document.getElementById('voice-preview').textContent = '';
  document.getElementById('voice-actions').style.display = 'none';
  document.getElementById('voice-panel').style.display = 'none';
}
</script>
{% endblock %}
